const SWIM_UP    = 0.12;
const WATER_DRAG = 0.78;

const pos     = new THREE.Vector3(0, 20, 15);
const posPrev = new THREE.Vector3(0, 20, 15);

let velY = 0, onGround = false, inWater = false, inLava = false, accumTime = 0;

function feetY() { return pos.y - PLAYER_H; }

function checkGround() {
    const by = Math.floor(feetY() - 0.1);
    const r  = PLAYER_R - 0.02;
    return isSolid(Math.round(pos.x + r), by, Math.round(pos.z + r))
        || isSolid(Math.round(pos.x - r), by, Math.round(pos.z + r))
        || isSolid(Math.round(pos.x + r), by, Math.round(pos.z - r))
        || isSolid(Math.round(pos.x - r), by, Math.round(pos.z - r));
}
function checkInWater() { return isWaterAt(Math.round(pos.x), Math.round(feetY() + 0.3), Math.round(pos.z)); }
function checkInLava()  { return isLavaAt(Math.round(pos.x),  Math.round(feetY() + 0.3), Math.round(pos.z)); }

function _isBlockedAt(axis, sign, nx, nz, fy, heights) {
    for (const h of heights) {
        const by = Math.round(fy + h);
        const perp = PLAYER_R - 0.02;
        let blocked;
        if (axis === "x") {
            const checkX = Math.round(nx + sign * PLAYER_R);
            blocked = isSolid(checkX, by, Math.round(nz - perp)) || isSolid(checkX, by, Math.round(nz + perp));
        } else {
            const checkZ = Math.round(nz + sign * PLAYER_R);
            blocked = isSolid(Math.round(nx - perp), by, checkZ) || isSolid(Math.round(nx + perp), by, checkZ);
        }
        if (blocked) return h;
    }
    return -1;
}

function tryMoveAxis(axis, delta) {
    if (delta === 0) return;
    const sign = Math.sign(delta);
    const nx = pos.x + (axis === "x" ? delta : 0);
    const nz = pos.z + (axis === "z" ? delta : 0);
    const fy = feetY();
    const heights = PLAYER_H >= 1.5 ? [0.1, 0.9, 1.6] : [0.1, 0.6];
    const blockedH = _isBlockedAt(axis, sign, nx, nz, fy, heights);

    if (blockedH < 0) {
        if (axis === "x") pos.x = nx; else pos.z = nz;
        return;
    }

    // Auto step-up: если уперлись только в нижний блок и стоим на земле — поднимаемся на 1 блок
    if (blockedH === 0.1 && onGround && velY <= 0) {
        const stepFy = fy + 1.0;
        const stillBlocked = _isBlockedAt(axis, sign, nx, nz, stepFy, heights);
        if (stillBlocked < 0) {
            // Над головой тоже должно быть свободно
            const headBy = Math.round(stepFy + PLAYER_H - 0.1);
            if (!isSolid(Math.round(pos.x), headBy, Math.round(pos.z))) {
                pos.y += 1.0;
                // Замедление при подъёме — двигаемся только на 60% от delta
                if (axis === "x") pos.x = pos.x + delta * 0.6;
                else               pos.z = pos.z + delta * 0.6;
                return;
            }
        }
    }
}

function physicsTick() {
    const spd = (inWater || inLava) ? 0.07 : 0.13;
    const sinY = Math.sin(yaw), cosY = Math.cos(yaw);
    let dx = 0, dz = 0;

    // Клавиатура
    if (keys["KeyW"] || keys["ArrowUp"])    { dx -= sinY * spd; dz -= cosY * spd; }
    if (keys["KeyS"] || keys["ArrowDown"])  { dx += sinY * spd; dz += cosY * spd; }
    if (keys["KeyA"] || keys["ArrowLeft"])  { dx -= cosY * spd; dz += sinY * spd; }
    if (keys["KeyD"] || keys["ArrowRight"]) { dx += cosY * spd; dz -= sinY * spd; }

    // Джойстик (joyX = вправо, joyY > 0 = тянем вниз = идём вперёд)
    if (joyX !== 0 || joyY !== 0) {
        dx += ( cosY * joyX + sinY * joyY) * spd;
        dz += (-sinY * joyX + cosY * joyY) * spd;
    }

    tryMoveAxis("x", dx);
    tryMoveAxis("z", dz);

    inWater = checkInWater();
    inLava  = !inWater && checkInLava();

    if (inWater || inLava) {
        velY *= WATER_DRAG;
        if (keys["Space"]) velY = SWIM_UP;
        else velY -= GRAVITY * 0.2;
        const headUnder = inWater
            ? isWaterAt(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z))
            : isLavaAt(Math.round(pos.x),  Math.round(pos.y), Math.round(pos.z));
        if (keys["Space"] && !headUnder) { velY = JUMP_FORCE; inWater = false; inLava = false; }
        pos.y += velY;
        const minY = DEEP_LIMIT + 0.5 + PLAYER_H;
        if (pos.y < minY) { pos.y = minY; if (velY < 0) velY = 0; }
    } else {
        if (!onGround) velY -= GRAVITY;
        pos.y += velY;
        onGround = checkGround();
        if (onGround && velY <= 0) {
            const by = Math.floor(feetY() - 0.1);
            pos.y = by + 1.0 + PLAYER_H;
            velY = 0;
        }
        if (keys["Space"] && onGround) { velY = JUMP_FORCE; onGround = false; }
    }

    if (velY > 0) {
        const hb = Math.round(pos.y + 0.1);
        if (isSolid(Math.round(pos.x), hb, Math.round(pos.z))) { velY = 0; pos.y = hb - 0.65; }
    }
    // Абсолютное дно — ниже лавы не падаем
    if (pos.y < DEEP_LIMIT + PLAYER_H) { pos.y = DEEP_LIMIT + PLAYER_H; velY = 0; }

}
// scheduleChunks вызывается из animate, не из physicsTick — убираем отсюда

// ─── LOD — единый подход для всех сущностей ──────────────────────────────────
// Три уровня по дистанции от игрока:
//   NEAR  (0..DIST_NEAR)  — полное обновление каждый кадр + visible
//   MID   (NEAR..DIST_MID)— обновление каждые N кадров + visible
//   FAR   (MID..)         — visible=false, обновление заморожено
//
// Функция entityLOD(ex, ez) возвращает: "near" | "mid" | "far"
// Используется одинаково для рыб, свиней, и любых будущих сущностей.

const LOD_NEAR = 40;   // блоков — полное обновление
const LOD_MID  = 80;   // блоков — редкое обновление
const LOD_NEAR2 = LOD_NEAR * LOD_NEAR;
const LOD_MID2  = LOD_MID  * LOD_MID;

function entityLOD(ex, ez) {
    const dx = ex - interpPos.x, dz = ez - interpPos.z;
    const d2 = dx*dx + dz*dz;
    if (d2 < LOD_NEAR2) return "near";
    if (d2 < LOD_MID2)  return "mid";
    return "far";
}

// ─── ФИЗИКА МЫШЕЙ ────────────────────────────────────────────────────────────
function updateMice(simTime) {
    for (const mouse of mouseGroup) {
        const d = mouse.userData;
        const lod = entityLOD(d.px, d.pz);

        if (lod === "far") { mouse.visible = false; continue; }
        mouse.visible = true;

        const skipUpdate = lod === "mid" && (simTime * 60 | 0) % 4 !== 0;
        if (!skipUpdate) {
            d.turnTimer--;
            if (d.turnTimer <= 0) {
                d.dir += (Math.random() - 0.5) * Math.PI * 1.2;
                d.turnTimer = 40 + Math.random() * 120;
            }

            const nx = d.px + Math.sin(d.dir) * d.speed;
            const nz = d.pz + Math.cos(d.dir) * d.speed;
            if (!inLake(nx, nz)) { d.px = nx; d.pz = nz; }
            else d.dir += Math.PI * 0.5;

            if (!d.onGround) d.velY -= GRAVITY;
            d.py += d.velY;

            const feetY = d.py - MOUSE_FOOT_OFFSET;
            const by = Math.floor(feetY - 0.05);
            if (isSolid(Math.round(d.px), by, Math.round(d.pz)) && d.velY <= 0) {
                d.py = (by + 0.5) + MOUSE_FOOT_OFFSET;
                d.velY = 0; d.onGround = true;
            } else {
                d.onGround = false;
                const surf = Math.max(terrainHeight(d.px, d.pz), WATER_LEVEL + 1);
                const expectedPy = (surf + 0.5) + MOUSE_FOOT_OFFSET;
                if (d.py < expectedPy) { d.py = expectedPy; d.velY = 0; d.onGround = true; }
            }

            mouse.position.set(d.px, d.py, d.pz);
            mouse.rotation.y = -d.dir;
        }

        // Анимация лапок — только NEAR (дети 5-8 = лапки)
        if (lod === "near") {
            d.legPhase += d.speed * 6;
            const swing = Math.sin(d.legPhase) * 0.4;
            for (let li = 5; li <= 8; li++) {
                if (mouse.children[li]) mouse.children[li].rotation.x = (li % 2 === 0 ? swing : -swing);
            }
        }
    }
}

function updatePigs(simTime) {
    for (const pig of pigGroup) {
        const d = pig.userData;
        const lod = entityLOD(d.px, d.pz);
        if (lod === "far") { pig.visible = false; continue; }
        pig.visible = true;
        const skipUpdate = lod === "mid" && (simTime * 60 | 0) % 4 !== 0;
        if (!skipUpdate) {
            // Детерминированный поворот: epoch зависит от dayTime и pigIdx
            const currentSec = dayTime * DAY_DURATION;
            const epoch = Math.floor(currentSec / d.turnPeriodSec);
            const dir = pigRng(d.pigIdx, epoch + 100) * Math.PI * 2;
            const nx = d.px + Math.sin(dir)*d.speed, nz = d.pz + Math.cos(dir)*d.speed;
            d.px = nx; d.pz = nz; d.dir = dir;
            if (!d.onGround) d.velY -= GRAVITY;
            d.py += d.velY;
            const pigFeetY = d.py - PIG_FOOT_OFFSET;
            const pigBy = Math.floor(pigFeetY - 0.05);
            if (isSolid(Math.round(d.px), pigBy, Math.round(d.pz)) && d.velY <= 0) {
                d.py = (pigBy+0.5)+PIG_FOOT_OFFSET; d.velY = 0; d.onGround = true;
            } else {
                d.onGround = false;
                const exp = (Math.max(terrainHeight(d.px,d.pz),WATER_LEVEL+1)+0.5)+PIG_FOOT_OFFSET;
                if (d.py < exp) { d.py = exp; d.velY = 0; d.onGround = true; }
            }
            pig.position.set(d.px, d.py, d.pz);
            pig.rotation.y = -d.dir;
        }
        if (lod === "near") {
            d.legPhase += d.speed * 4;
            const sw = Math.sin(d.legPhase) * 0.3;
            pig.children[3].rotation.x =  sw;
            pig.children[4].rotation.x = -sw;
            pig.children[5].rotation.x = -sw;
            pig.children[6].rotation.x =  sw;
        }
    }
}

// ─── ВВОД ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener("keyup", e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
// Pointer lock только по клику на canvas рендерера, не на UI-элементы
renderer.domElement.addEventListener("click", () => renderer.domElement.requestPointerLock());
document.addEventListener("mousemove", e => {
    if (document.pointerLockElement !== renderer.domElement) return;
    const k = 0.002 * mouseSensitivity;
    yaw   -= e.movementX * k;
    pitch -= e.movementY * k;
    pitch  = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
});

// Общие функции действий — используются и десктопом и мобильными кнопками.
// Всегда пересчитывают луч сами, не полагаясь на currentHit из прошлого кадра.
function getHit() {
    _rayOrig.copy(interpPos);
    _rayDir.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    return castRay(_rayOrig, _rayDir, 6);
}

const _entityRaycaster = new THREE.Raycaster();

function doBreak() {
    // Проверяем попадание по мыши (только в режиме кота)
    if (catLife && mouseGroup.length > 0) {
        _entityRaycaster.set(interpPos, _rayDir);
        const hits = _entityRaycaster.intersectObjects(mouseGroup, true);
        if (hits.length > 0 && hits[0].distance < 5) {
            // Находим корневой Group (parent мешей мыши)
            let obj = hits[0].object;
            while (obj.parent && !(obj.parent instanceof THREE.Scene)) obj = obj.parent;
            const idx = mouseGroup.indexOf(obj);
            if (idx >= 0) {
                scene.remove(obj);
                mouseGroup.splice(idx, 1);
            }
            return;
        }
    }
    const hit = getHit();
    if (!hit) return;
    const broken = hit.entry;
    const k = bkey(broken.x, broken.y, broken.z);
    if (broken.type === "rainbow") { rainbowCount++; updateRainbowUI(); }
    if (broken.type === "aquarium") removeAquariumFish(broken.x, broken.y, broken.z);
    removeBlock(broken);
    flushColors();
    currentHit = null;
    // Трекинг дельты
    if (userPlaced.has(k)) {
        userPlaced.delete(k);
    } else if (worldGenKeys.has(k)) {
        userRemoved.add(k);
    }
    mpSendBlock("remove", broken.x, broken.y, broken.z);
}

function doPlace() {
    const hit = getHit();
    if (!hit) return;
    const e2 = hit.entry, n = hit.faceNormal;
    const bx = e2.x + n.x, by = e2.y + n.y, bz = e2.z + n.z;
    const dx = Math.abs(bx - pos.x), dz2 = Math.abs(bz - pos.z), dy = by - feetY();
    if (dx < 0.6 && dz2 < 0.6 && dy > -0.1 && dy < PLAYER_H + 0.2) return;
    if (selected === "rainbow") {
        if (rainbowCrafted <= 0) return;
        const pk = bkey(bx, by, bz);
        userRemoved.delete(pk);
        addBlock._lastFail = null;
        addBlock(bx, by, bz, selected);
        if (addBlock._lastFail) {
            if (worldGenKeys.has(pk)) userRemoved.add(pk);
            return;
        }
        userPlaced.set(pk, { x: Math.round(bx), y: Math.round(by), z: Math.round(bz), type: selected });
        mpSendBlock("place", bx, by, bz, selected);
        rainbowCount--;
        rainbowCrafted--;
        updateRainbowUI();
        if (rainbowCrafted === 0) {
            document.querySelectorAll(".slot").forEach(s => s.classList.remove("active"));
            document.querySelector(".slot[data-type='grass']").classList.add("active");
            selected = "grass";
        }
    } else {
        // Снимаем флаг "удалён" до addBlock — иначе он откажется ставить блок
        const pk = bkey(bx, by, bz);
        userRemoved.delete(pk);
        addBlock._lastFail = null;
        addBlock(bx, by, bz, selected);
        if (selected === "aquarium") spawnAquariumFish(bx, by, bz);
        if (!addBlock._lastFail) {
            userPlaced.set(pk, { x: Math.round(bx), y: Math.round(by), z: Math.round(bz), type: selected });
            mpSendBlock("place", bx, by, bz, selected);
        } else if (worldGenKeys.has(pk)) {
            // Если addBlock провалился по другой причине — восстанавливаем флаг удалённости
            userRemoved.add(pk);
        }
    }
    flushColors();
}

document.addEventListener("mousedown", e => {
    if (document.pointerLockElement !== renderer.domElement) return;
    if (e.button === 0) doBreak();
    if (e.button === 2) doPlace();
});
document.addEventListener("contextmenu", e => e.preventDefault());

// ─── 3D ИКОНКИ БЛОКОВ НА CANVAS ─────────────────────────────────────────────
// Рисуем изометрическую проекцию куба с тремя гранями разной яркости.
// Каждый блок имеет свои цвета граней (top / left / right).
const ICON_DEF = {
    grass:   { top: "#5a9e38", left: "#7a5535", right: "#5e3f26", label: "🌿" },
    stone:   { top: "#888888", left: "#606060", right: "#484848", label: "🪨" },
    wood:    { top: "#8b5a2b", left: "#6d4520", right: "#4e3018", label: "🪵" },
    leaf:    { top: "#2e7d32", left: "#1b5e20", right: "#124016", label: "🍃" },
    sand:    { top: "#e2c97e", left: "#c8a84b", right: "#a07830", label: "🏖" },
    rainbow: { top: null,      left: null,      right: null,      label: "🌈" },
    lava:    { top: "#ff7043", left: "#bf360c", right: "#8b1a00", label: "🔥" },
    water:   { top: "#42a5f5", left: "#1565c0", right: "#0d47a1", label: "💧" },
    aquarium:{ top: "#aaeeff", left: "#55bbdd", right: "#2299bb", label: "🐠" },
    glass:   { top: "#e8f8ff", left: "#b0ddf0", right: "#80bedd", label: "🪟" },
    cactus:  { top: "#3d8b40", left: "#2e6b32", right: "#1f4a22", label: "🌵" },
    flower:  { top: "#FF50A0", left: "#E03080", right: "#C01060", label: "🌸" },
};

function drawBlockIcon(canvas, type) {
    const S = 104; // рендерим в 2x для чёткости
    canvas.width  = S;
    canvas.height = S;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, S, S);

    const def = ICON_DEF[type];
    if (!def) return;

    if (type === "rainbow") {
        // Радужный куб — особая отрисовка с градиентными гранями
        drawRainbowIcon(ctx, S);
        return;
    }

    if (type === "aquarium") {
        drawAquariumIcon(ctx, S);
        return;
    }

    if (type === "glass") {
        drawGlassIcon(ctx, S);
        return;
    }

    if (type === "cactus") {
        drawCactusIcon(ctx, S);
        return;
    }

    // Изометрический куб: проекция top / left-front / right-front
    // Размер грани в проекции
    const W = S * 0.72, H = W * 0.5; // ширина и высота top-ромба
    const FH = S * 0.38; // высота боковых граней

    const cx = S / 2;
    const topY = S * 0.14;

    // Top face (ромб)
    ctx.beginPath();
    ctx.moveTo(cx,       topY);
    ctx.lineTo(cx + W/2, topY + H/2);
    ctx.lineTo(cx,       topY + H);
    ctx.lineTo(cx - W/2, topY + H/2);
    ctx.closePath();
    ctx.fillStyle = def.top;
    ctx.fill();
    // тонкая обводка
    ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 0.8; ctx.stroke();

    // Вспомогательная функция: рисует параллелограмм с необязательной зелёной полоской сверху
    function drawSideFace(p1, p2, p3, p4, baseColor, stripColor) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(...p1); ctx.lineTo(...p2);
        ctx.lineTo(...p3); ctx.lineTo(...p4);
        ctx.closePath();
        ctx.fillStyle = baseColor;
        ctx.fill();
        if (stripColor) {
            // Зелёная полоска — верхние ~15% грани (интерполяция между верхними и нижними точками)
            const t = 0.15;
            const s1 = p1, s2 = p2;
            const s3 = [p2[0]*(1-t)+p3[0]*t, p2[1]*(1-t)+p3[1]*t];
            const s4 = [p1[0]*(1-t)+p4[0]*t, p1[1]*(1-t)+p4[1]*t];
            ctx.beginPath();
            ctx.moveTo(...s1); ctx.lineTo(...s2);
            ctx.lineTo(...s3); ctx.lineTo(...s4);
            ctx.closePath();
            ctx.fillStyle = stripColor;
            ctx.fill();
        }
        ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(...p1); ctx.lineTo(...p2);
        ctx.lineTo(...p3); ctx.lineTo(...p4);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }

    const strip = type === "grass" ? "#5a9e38" : null;
    const leftDirt  = type === "grass" ? "#7a5535" : def.left;
    const rightDirt = type === "grass" ? "#5e3f26" : def.right;

    // Left face
    drawSideFace(
        [cx - W/2, topY + H/2], [cx, topY + H],
        [cx, topY + H + FH],    [cx - W/2, topY + H/2 + FH],
        leftDirt, strip
    );
    // Right face
    drawSideFace(
        [cx, topY + H],          [cx + W/2, topY + H/2],
        [cx + W/2, topY + H/2 + FH], [cx, topY + H + FH],
        rightDirt, strip
    );

    // Небольшая ambient occlusion по краям
    const grad = ctx.createLinearGradient(0, topY + H, 0, topY + H + FH);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,0.18)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx - W/2, topY + H/2);
    ctx.lineTo(cx + W/2, topY + H/2);
    ctx.lineTo(cx + W/2, topY + H/2 + FH);
    ctx.lineTo(cx - W/2, topY + H/2 + FH);
    ctx.closePath();
    ctx.fill();

    // Блик на top-грани
    ctx.beginPath();
    ctx.moveTo(cx,       topY + 2);
    ctx.lineTo(cx + W/2 * 0.6, topY + H/2 * 0.6);
    ctx.lineTo(cx,       topY + H * 0.6);
    ctx.lineTo(cx - W/2 * 0.6, topY + H/2 * 0.6);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fill();
}

function drawRainbowIcon(ctx, S) {
    const COLORS = ["#ff4444","#ff9900","#ffee00","#44cc44","#2299ff","#9933ff","#ff44bb"];
    const W = S * 0.72, H = W * 0.5, FH = S * 0.38;
    const cx = S / 2, topY = S * 0.14;

    // Top — горизонтальные полосы в ромбе
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath(); ctx.clip();
    const strH = H / COLORS.length;
    for (let i = 0; i < COLORS.length; i++) {
        ctx.fillStyle = COLORS[i];
        ctx.fillRect(cx - W/2, topY + i * strH, W, strH + 1);
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath(); ctx.stroke();

    // Left face — вертикальные полосы
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath(); ctx.clip();
    const lw = W / COLORS.length;
    for (let i = 0; i < COLORS.length; i++) {
        const darkened = shadeColor(COLORS[i], -40);
        ctx.fillStyle = darkened;
        // Вертикальные полосы скошены под углом грани
        ctx.fillRect(cx - W/2 + i * lw, topY, lw + 1, S);
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath(); ctx.stroke();

    // Right face
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath(); ctx.clip();
    for (let i = 0; i < COLORS.length; i++) {
        const darkened = shadeColor(COLORS[i], -65);
        ctx.fillStyle = darkened;
        ctx.fillRect(cx + i * lw, topY, lw + 1, S);
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath(); ctx.stroke();

    // Блик
    ctx.beginPath();
    ctx.moveTo(cx, topY+2); ctx.lineTo(cx+W/2*0.5, topY+H/2*0.5);
    ctx.lineTo(cx, topY+H*0.5); ctx.lineTo(cx-W/2*0.5, topY+H/2*0.5);
    ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fill();
}

function shadeColor(hex, amt) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.max(0, Math.min(255, r + amt));
    g = Math.max(0, Math.min(255, g + amt));
    b = Math.max(0, Math.min(255, b + amt));
    return `rgb(${r},${g},${b})`;
}

function drawAquariumIcon(ctx, S) {
    const W = S * 0.72, H = W * 0.5, FH = S * 0.38;
    const cx = S / 2, topY = S * 0.14;

    // Top face
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath();
    ctx.fillStyle = "rgba(150,230,255,0.7)"; ctx.fill();
    ctx.strokeStyle = "rgba(0,150,220,0.5)"; ctx.lineWidth = 0.8; ctx.stroke();

    // Left face — вода с рыбкой
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(30,120,200,0.45)"; ctx.fill();
    ctx.strokeStyle = "rgba(0,100,180,0.6)"; ctx.lineWidth = 0.8; ctx.stroke();
    // рыбка слева
    ctx.fillStyle = "#ff9800";
    ctx.beginPath(); ctx.ellipse(cx-W/3.5, topY+H+FH*0.45, 6, 3.5, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx-W/3.5+6, topY+H+FH*0.45); ctx.lineTo(cx-W/3.5+10, topY+H+FH*0.45-3); ctx.lineTo(cx-W/3.5+10, topY+H+FH*0.45+3); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Right face — вода с рыбкой
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(20,90,160,0.55)"; ctx.fill();
    ctx.strokeStyle = "rgba(0,80,150,0.6)"; ctx.lineWidth = 0.8; ctx.stroke();
    // рыбка справа
    ctx.fillStyle = "#e91e63";
    ctx.beginPath(); ctx.ellipse(cx+W/4.5, topY+H+FH*0.35, 5, 3, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+W/4.5-5, topY+H+FH*0.35); ctx.lineTo(cx+W/4.5-9, topY+H+FH*0.35-2.5); ctx.lineTo(cx+W/4.5-9, topY+H+FH*0.35+2.5); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Блик на top
    ctx.beginPath();
    ctx.moveTo(cx, topY+2); ctx.lineTo(cx+W/2*0.5, topY+H/2*0.5);
    ctx.lineTo(cx, topY+H*0.5); ctx.lineTo(cx-W/2*0.5, topY+H/2*0.5);
    ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.25)"; ctx.fill();
}

function drawGlassIcon(ctx, S) {
    const W = S * 0.72, H = W * 0.5, FH = S * 0.38;
    const cx = S / 2, topY = S * 0.14;

    // Top face — почти прозрачная
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath();
    ctx.fillStyle = "rgba(210,240,255,0.55)"; ctx.fill();
    ctx.strokeStyle = "rgba(120,190,230,0.7)"; ctx.lineWidth = 1; ctx.stroke();

    // Left face
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(140,200,230,0.38)"; ctx.fill();
    ctx.strokeStyle = "rgba(80,150,200,0.6)"; ctx.lineWidth = 1; ctx.stroke();

    // Right face
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(100,170,210,0.45)"; ctx.fill();
    ctx.strokeStyle = "rgba(60,120,180,0.6)"; ctx.lineWidth = 1; ctx.stroke();

    // Крупный блик — характерная черта стекла
    ctx.beginPath();
    ctx.moveTo(cx - W*0.08, topY + H*0.18);
    ctx.lineTo(cx - W*0.28, topY + H*0.46);
    ctx.lineTo(cx - W*0.22, topY + H*0.52);
    ctx.lineTo(cx - W*0.02, topY + H*0.24);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.fill();

    // Малый блик
    ctx.beginPath();
    ctx.moveTo(cx + W*0.05, topY + H*0.08);
    ctx.lineTo(cx + W*0.18, topY + H*0.22);
    ctx.lineTo(cx + W*0.14, topY + H*0.26);
    ctx.lineTo(cx + W*0.01, topY + H*0.12);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();
}

function drawCactusIcon(ctx, S) {
    const g = "#5cb85c", gd = "#3d8b40", gdd = "#2a6b2c";
    function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
    function outline(x, y, w, h) {
        ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    }

    const tw = S * 0.18;  // ширина ствола
    const tx = (S - tw) / 2;
    const ty = S * 0.08;  // верхушка ствола
    const th = S * 0.76;  // высота ствола

    // Ствол (тёмная правая грань для объёма)
    rect(tx, ty, tw * 0.65, th, g);
    rect(tx + tw * 0.65, ty, tw * 0.35, th, gd);
    outline(tx, ty, tw, th);

    // Левая рука (горизонтальная + вертикальная)
    const aw = S * 0.22, ah = tw; // ширина и высота горизонтального сегмента
    const armY = ty + th * 0.30;
    rect(tx - aw, armY, aw, ah * 0.65, g);
    rect(tx - aw, armY + ah * 0.65, aw, ah * 0.35, gd);
    outline(tx - aw, armY, aw, ah);
    // вертикальный отросток
    rect(tx - aw, armY - th * 0.22, ah * 0.65, th * 0.22, g);
    rect(tx - aw + ah * 0.65, armY - th * 0.22, ah * 0.35, th * 0.22, gd);
    outline(tx - aw, armY - th * 0.22, ah, th * 0.22);

    // Правая рука
    const armY2 = ty + th * 0.50;
    rect(tx + tw, armY2, aw, ah * 0.65, g);
    rect(tx + tw, armY2 + ah * 0.65, aw, ah * 0.35, gd);
    outline(tx + tw, armY2, aw, ah);
    rect(tx + tw + aw - ah * 0.65, armY2 - th * 0.18, ah * 0.65, th * 0.18, g);
    rect(tx + tw + aw - ah * 0.65 + ah * 0.65, armY2 - th * 0.18, ah * 0.35, th * 0.18, gdd);
    outline(tx + tw + aw - ah, armY2 - th * 0.18, ah, th * 0.18);

    // Розовые цветки на стволе
    function flower(cx, cy) {
        ctx.beginPath(); ctx.arc(cx, cy, S * 0.055, 0, Math.PI * 2);
        ctx.fillStyle = "#ff50a0"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, S * 0.022, 0, Math.PI * 2);
        ctx.fillStyle = "#ffe000"; ctx.fill();
    }
    flower(tx - S * 0.035, ty + th * 0.45);
    flower(tx + tw + S * 0.035, ty + th * 0.65);
}

const SLOT_TYPES = ["grass","stone","wood","leaf","sand","cactus","rainbow","aquarium","glass"];

function selectSlot(idx) {
    const type = SLOT_TYPES[idx];
    if (!type) return;
    // Rainbow можно выбрать только если есть скрафченные
    if (type === "rainbow" && rainbowCrafted === 0) return;
    document.querySelectorAll(".slot").forEach(s => s.classList.remove("active"));
    const slot = document.querySelector(`.slot[data-type="${type}"]`);
    if (slot) slot.classList.add("active");
    selected = type;
}

// Клик мышью по слоту — работает всегда (pointer lock не мешает)
document.querySelectorAll(".slot").forEach((slot) => {
    const type = slot.dataset.type;
    slot.addEventListener("mousedown", e => {
        e.stopPropagation();
        const idx = SLOT_TYPES.indexOf(type);
        if (idx >= 0) selectSlot(idx);
    });
    // На мобильном — touchstart, иначе look-zone перехватывает
    slot.addEventListener("touchstart", e => {
        e.stopPropagation();
        e.preventDefault();
        const idx = SLOT_TYPES.indexOf(type);
        if (idx >= 0) selectSlot(idx);
    }, { passive: false });
});

// Цифры 1–6 и Tab
document.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (e.code === "Space") e.preventDefault();
    if (e.code === "ArrowUp" || e.code === "ArrowDown" || e.code === "ArrowLeft" || e.code === "ArrowRight") {
        // Не перехватываем стрелки когда фокус на слайдере или другом input — браузер сам их обработает
        if (!(document.activeElement instanceof HTMLInputElement)) e.preventDefault();
    }
    // Цифры
    if (e.code.startsWith("Digit")) {
        const n = parseInt(e.code.replace("Digit","")) - 1;
        if (n >= 0 && n < SLOT_TYPES.length) selectSlot(n);
    }
    // Tab — следующий доступный слот (пропускает rainbow если 0)
    if (e.code === "Tab") {
        e.preventDefault();
        const cur = SLOT_TYPES.indexOf(selected);
        for (let i = 1; i <= SLOT_TYPES.length; i++) {
            const next = (cur + i) % SLOT_TYPES.length;
            const t = SLOT_TYPES[next];
            if (t === "rainbow" && rainbowCrafted === 0) continue;
            selectSlot(next);
            break;
        }
    }
});

// ─── МОБИЛЬНЫЕ КОНТРОЛЫ ──────────────────────────────────────────────────────
// Джойстик управляет движением через виртуальные оси joyX/joyY [-1..1].
// Область свайпа справа управляет камерой (yaw/pitch).
// Кнопка прыжка — keys["Space"].

let joyX = 0, joyY = 0; // виртуальные оси джойстика

const joystickZone = document.getElementById("joystick-zone");
const joystickKnob = document.getElementById("joystick-knob");
const btnJump      = document.getElementById("btn-jump");
const lookZone     = document.getElementById("look-zone");

if (joystickZone) {
    const JOY_R = 65; // радиус зоны в px
    const KNOB_R = 26;
    let joyActive = false, joyId = -1;
    let joyOriginX = 0, joyOriginY = 0;

    joystickZone.addEventListener("touchstart", e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        joyActive = true; joyId = t.identifier;
        const rect = joystickZone.getBoundingClientRect();
        joyOriginX = rect.left + rect.width  / 2;
        joyOriginY = rect.top  + rect.height / 2;
    }, { passive: false });

    function joyMove(e) {
        if (!joyActive) return;
        e.preventDefault();
        let t = null;
        for (const touch of e.changedTouches) if (touch.identifier === joyId) { t = touch; break; }
        if (!t) return;
        let dx = t.clientX - joyOriginX;
        let dy = t.clientY - joyOriginY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > JOY_R) { dx = dx/dist*JOY_R; dy = dy/dist*JOY_R; }
        joyX = dx / JOY_R;
        joyY = dy / JOY_R;
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
    function joyEnd(e) {
        for (const touch of e.changedTouches) {
            if (touch.identifier === joyId) {
                joyActive = false; joyId = -1;
                joyX = 0; joyY = 0;
                joystickKnob.style.transform = "translate(-50%, -50%)";
            }
        }
    }
    document.addEventListener("touchmove",   joyMove, { passive: false });
    document.addEventListener("touchend",    joyEnd);
    document.addEventListener("touchcancel", joyEnd);
}

// Кнопка прыжка
if (btnJump) {
    btnJump.addEventListener("touchstart", e => { e.preventDefault(); keys["Space"] = true;  }, { passive: false });
    btnJump.addEventListener("touchend",   e => { e.preventDefault(); keys["Space"] = false; }, { passive: false });
}

const btnBreak = document.getElementById("btn-break");

// Зона свайпа для камеры (правая половина экрана)
if (lookZone) {
    let lookId = -1, lookLastX = 0, lookLastY = 0;
    const LOOK_SENS = 0.005;
    const BTN_IDS = new Set(["btn-jump","btn-break","btn-place"]);

    lookZone.addEventListener("touchstart", e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        // Не захватываем тач если он начался на кнопке
        const target = document.elementFromPoint(t.clientX, t.clientY);
        if (target && BTN_IDS.has(target.id)) return;
        lookId = t.identifier; lookLastX = t.clientX; lookLastY = t.clientY;
    }, { passive: false });

    lookZone.addEventListener("touchmove", e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            if (t.identifier !== lookId) continue;
            yaw   -= (t.clientX - lookLastX) * LOOK_SENS;
            pitch -= (t.clientY - lookLastY) * LOOK_SENS;
            pitch  = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            lookLastX = t.clientX; lookLastY = t.clientY;
        }
    }, { passive: false });

    lookZone.addEventListener("touchend",   e => { for (const t of e.changedTouches) if (t.identifier === lookId) lookId = -1; });
    lookZone.addEventListener("touchcancel",e => { lookId = -1; });
}

function _mpApplyPlayer(id, name, isCat, x, y, z, yawVal) {
    let p = otherPlayers.get(id);
    if (!p) {
        const m = _mpCreateMesh(isCat);
        p = { group: m.group, armL: m.armL, armR: m.armR, legL: m.legL, legR: m.legR,
              tx: x, ty: y, tz: z, tYaw: yawVal,
              cx: x, cy: y, cz: z, cYaw: yawVal, catLife: isCat, walkPhase: 0, name };
        otherPlayers.set(id, p);
        p.group.visible = showPlayers;
    }
    p.tx = x; p.ty = y; p.tz = z; p.tYaw = yawVal;
    if (name) p.name = name;
}

function _mpRemovePlayer(id) {
    const p = otherPlayers.get(id);
    if (p) { scene.remove(p.group); otherPlayers.delete(id); }
}

function mpUpdatePlayers(dt) {
    const alpha = Math.min(1, dt * 12);
    for (const [, p] of otherPlayers) {
        const prevX = p.cx, prevZ = p.cz;
        p.cx += (p.tx - p.cx) * alpha;
        p.cy += (p.ty - p.cy) * alpha;
        p.cz += (p.tz - p.cz) * alpha;

        let da = p.tYaw - p.cYaw;
        if (da > Math.PI)  da -= Math.PI * 2;
        if (da < -Math.PI) da += Math.PI * 2;
        p.cYaw += da * alpha;

        // Анимация ходьбы — раскачиваем руки и ноги
        const speed = dt > 0 ? Math.hypot(p.cx - prevX, p.cz - prevZ) / dt : 0;
        if (speed > 0.05) {
            p.walkPhase = (p.walkPhase + dt * (p.catLife ? 12 : 8)) % (Math.PI * 2);
        } else {
            p.walkPhase *= 0.80; // плавное затухание
        }
        if (p.catLife) {
            // Диагональный галоп: передняя-левая + задняя-правая синхронны
            const catSwing = Math.sin(p.walkPhase) * 0.5;
            if (p.armL) p.armL.rotation.x =  catSwing; // перед-лев
            if (p.armR) p.armR.rotation.x = -catSwing; // перед-прав
            if (p.legL) p.legL.rotation.x = -catSwing; // зад-лев
            if (p.legR) p.legR.rotation.x =  catSwing; // зад-прав
        } else {
            const swing = Math.sin(p.walkPhase) * 0.55;
            if (p.legL) p.legL.rotation.x =  swing;
            if (p.legR) p.legR.rotation.x = -swing;
            if (p.armL) p.armL.rotation.x = -swing;
            if (p.armR) p.armR.rotation.x =  swing;
        }

        // -0.5 — компенсация: блок BoxGeometry(1,1,1) центрирован, верх блока y=15 на 15.5,
        // а физика возвращает feetY = by+1 = 16 (отсчёт от низа блока).
        p.group.position.set(p.cx, p.cy - 0.5, p.cz);
        p.group.rotation.y = p.cYaw + Math.PI;
    }
}

// Стабильный per-устройство UUID игрока. Имя может меняться, этот id — нет.
// Сервер использует его как ключ для PlayerSpawn и для дедупликации reconnect'ов.
function getPlayerId() {
    let id = localStorage.getItem("mishaCraft_playerId");
    if (!id) {
        id = (crypto && crypto.randomUUID)
            ? crypto.randomUUID()
            : "p-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("mishaCraft_playerId", id);
    }
    return id;
}

// Собираем fingerprint устройства/браузера. Пока сервер просто складывает его
// в world.json — никакой логики поверх не строится. На будущее: анти-абуз,
// аналитика «с какого устройства этот игрок обычно заходит», и т.п.
function collectFingerprint() {
    const safe = (fn) => { try { return fn(); } catch (_) { return null; } };
    return {
        userAgent: navigator.userAgent || "",
        language: navigator.language || "",
        languages: (navigator.languages || []).join(","),
        platform: navigator.platform || "",
        userAgentData: safe(() => navigator.userAgentData ? {
            platform: navigator.userAgentData.platform,
            mobile:   navigator.userAgentData.mobile,
            brands:   navigator.userAgentData.brands,
        } : null),
        timezone: safe(() => Intl.DateTimeFormat().resolvedOptions().timeZone) || "",
        timezoneOffsetMin: -new Date().getTimezoneOffset(),
        screen: {
            w: screen.width,
            h: screen.height,
            availW: screen.availWidth,
            availH: screen.availHeight,
            depth: screen.colorDepth,
            // Физическое разрешение в пикселях (CSS-px × DPR)
            physicalW: Math.round(screen.width  * (window.devicePixelRatio || 1)),
            physicalH: Math.round(screen.height * (window.devicePixelRatio || 1)),
            orientation: safe(() => screen.orientation ? screen.orientation.type : null),
        },
        window: {
            innerW:  window.innerWidth,
            innerH:  window.innerHeight,
            outerW:  window.outerWidth,
            outerH:  window.outerHeight,
        },
        dpr: window.devicePixelRatio || 1,
        cores: navigator.hardwareConcurrency || 0,
        memoryGB: navigator.deviceMemory || 0,
        touchPoints: navigator.maxTouchPoints || 0,
        webgl: collectWebGLInfo(),
        connection: safe(() => navigator.connection ? {
            effectiveType: navigator.connection.effectiveType,
            downlink:      navigator.connection.downlink,
            rtt:           navigator.connection.rtt,
            saveData:      navigator.connection.saveData,
        } : null),
        cordova: typeof window.cordova !== "undefined" ? (window.cordova.platformId || "yes") : "",
        capturedAt: new Date().toISOString(),
    };
}

function collectWebGLInfo() {
    try {
        const canvas = document.createElement("canvas");
        const gl = canvas.getContext("webgl2") || canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        if (!gl) return null;
        const dbg = gl.getExtension("WEBGL_debug_renderer_info");
        return {
            vendor:   dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : gl.getParameter(gl.VENDOR),
            renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
            version:  gl.getParameter(gl.VERSION),
        };
    } catch (_) { return null; }
}

function mpSendMove(now) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (!myNetId) return; // ждём init — pos ещё не инициализирован
    if (now - _mpLastSend < MP_INTERVAL) return;
    _mpLastSend = now;
    const mpName = localStorage.getItem("mishaCraft_playerName") || "Player";
    ws.send(JSON.stringify({ type: "move", x: pos.x, y: feetY(), z: pos.z, yaw, pitch, name: mpName, catLife }));
}

function mpSendBlock(action, x, y, z, blockType) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: "block", action, x, y, z, blockType: blockType || "" }));
}

let _mpReconnectTimer = null;
let _mpIntentional = false; // true когда закрываем сами (без переподключения)

function connectMultiplayer(serverUrl, playerName) {
    _mpIntentional = false;
    if (ws) { _mpIntentional = true; ws.close(); ws = null; _mpIntentional = false; }
    if (!serverUrl) return;

    try { ws = new WebSocket(serverUrl); }
    catch(e) { console.warn("MP: неверный URL", e); return; }

    ws.onopen = () => {
        mpConnected = true;
        clearTimeout(_mpReconnectTimer);
        ws.send(JSON.stringify({
            type: "join",
            playerId: getPlayerId(),
            name: playerName || "Player",
            catLife,
            fingerprint: collectFingerprint(),
        }));
    };

    ws.onclose = () => {
        mpConnected = false;
        myNetId = null;
        for (const [id] of otherPlayers) _mpRemovePlayer(id);
        if (_mpIntentional) return;
        showToast(t("mpDisconnected"), "#fa0", 3000);
        console.log("MP: отключён, переподключаемся через 3с");
        _mpReconnectTimer = setTimeout(() => {
            connectMultiplayer(serverUrl, playerName);
            // После успешного подключения onopen покажет тост
            const prevOnopen = ws?.onopen;
            if (ws) ws.onopen = () => {
                if (prevOnopen) prevOnopen();
                showToast(t("mpReconnected"), "#4c4", 2500);
            };
        }, 3000);
    };

    ws.onerror = () => { if (!mpConnected) showToast(t("mpUnavailable", serverUrl), "#f44", 4000); };

    ws.onmessage = ({ data }) => {
        let msg;
        try { msg = JSON.parse(data); } catch { return; }

        switch (msg.type) {
            case "init":
                myNetId = msg.id;
                if (msg.players) {
                    for (const p of msg.players) {
                        _mpApplyPlayer(p.id, p.name, p.catLife, p.x, p.y, p.z, p.yaw);
                    }
                }
                // Инициализируем мир серверным seed
                if (msg.seed) { initWorldSeed(msg.seed); spawnPigs(); }
                if (msg.worldTime != null) anchorDayTime(msg.worldTime);
                // Ждём применения дельты прежде чем генерировать чанки —
                // иначе scheduleChunks заполнит blockMap сгенерированными блоками
                // раньше, чем loadWorldDelta дойдёт до них, и addBlock тихо
                // пропустит блоки из дельты с ошибкой "occupied".
                (async () => {
                if (msg.delta) await loadWorldDelta(msg.delta);
                // Позиция: серверная (повторный вход) или спавн
                if (msg.spawnPos) {
                    const sp = msg.spawnPos;
                    // sp.y — высота ног (feetY), добавляем PLAYER_H чтобы получить pos.y (высоту камеры)
                    const spCamY = sp.y + PLAYER_H;
                    pos.set(sp.x, spCamY, sp.z);
                    posPrev.set(sp.x, spCamY, sp.z);
                    camera.position.set(sp.x, spCamY, sp.z);
                    yaw   = sp.yaw   ?? 0;
                    pitch = sp.pitch ?? 0;
                    scheduleChunks(sp.x, sp.z, true);
                    // Ждём генерации чанка игрока перед стартом физики
                    const playerCK = chunkKey(
                        Math.floor(sp.x / CHUNK_SIZE),
                        Math.floor(sp.z / CHUNK_SIZE)
                    );
                    const waitForChunk = setInterval(() => {
                        if (loadedChunks.has(playerCK)) {
                            clearInterval(waitForChunk);
                            worldGenDone = true;
                        }
                    }, 50);
                } else {
                    // Ищем точку спавна вне воды
                    let spawnX = 0, spawnZ = 0;
                    outer2: for (let r = 0; r <= 20; r++) {
                        for (let dx = -r; dx <= r; dx++) {
                            for (let dz = -r; dz <= r; dz++) {
                                if (Math.abs(dx) !== r && Math.abs(dz) !== r) continue;
                                const sx = dx * 3, sz = dz * 3;
                                if (!inLake(sx, sz) && !inSand(sx, sz)) {
                                    spawnX = sx; spawnZ = sz; break outer2;
                                }
                            }
                        }
                    }
                    const spawnY = Math.max(terrainHeight(spawnX, spawnZ), WATER_LEVEL + 1) + 3;
                    pos.set(spawnX, spawnY, spawnZ);
                    posPrev.set(spawnX, spawnY, spawnZ);
                    camera.position.set(spawnX, spawnY, spawnZ);
                    scheduleChunks(spawnX, spawnZ, true);
                    worldGenDone = true;
                }
                })();
                break;

            case "player_join":
                _mpApplyPlayer(msg.id, msg.name, msg.catLife,
                    msg.x || 0, msg.y || 0, msg.z || 0, msg.yaw || 0);
                break;

            case "player_leave":
                _mpRemovePlayer(msg.id);
                break;

            case "player_move":
                if (msg.id === myNetId) break;
                {
                    const _prev = otherPlayers.get(msg.id);
                    const _x = msg.x ?? _prev?.tx;
                    const _y = msg.y ?? _prev?.ty;
                    const _z = msg.z ?? _prev?.tz;
                    if (_x === undefined || _y === undefined || _z === undefined) break;
                    _mpApplyPlayer(msg.id, msg.name || "", msg.catLife || false, _x, _y, _z, msg.yaw ?? _prev?.tYaw ?? 0);
                }
                break;

            case "block": {
                const bk = bkey(msg.x, msg.y, msg.z);
                if (msg.action === "place") {
                    // Если в этом месте уже есть блок — заменим
                    const existing = blockMap.get(bk);
                    if (existing) {
                        if (existing.type === "aquarium") removeAquariumFish(existing.x, existing.y, existing.z);
                        removeBlock(existing);
                    }
                    // Снимаем флаг "удалён" до addBlock
                    userRemoved.delete(bk);
                    addBlock._lastFail = null;
                    addBlock(msg.x, msg.y, msg.z, msg.blockType);
                    if (!addBlock._lastFail) {
                        userPlaced.set(bk, { x: Math.round(msg.x), y: Math.round(msg.y), z: Math.round(msg.z), type: msg.blockType });
                    }
                    flushColors();
                } else if (msg.action === "remove") {
                    const entry = blockMap.get(bk);
                    if (entry) { removeBlock(entry); flushColors(); }
                    if (userPlaced.has(bk)) userPlaced.delete(bk);
                    else if (worldGenKeys.has(bk)) userRemoved.add(bk);
                }
                markChunkDirty(
                    Math.floor(msg.x / CHUNK_SIZE),
                    Math.floor(msg.z / CHUNK_SIZE)
                );
                break;
            }
        }
    };
}

// ─── ГЛАВНЫЙ ЦИКЛ ────────────────────────────────────────────────────────────
let lastRafTime = -1, simTime = 0;
const underwaterDiv  = document.getElementById("underwater");
const lavaOverlayDiv = document.getElementById("lava-overlay");

function animate(now) {
    requestAnimationFrame(animate);
    if (lastRafTime < 0) { lastRafTime = now; return; }

    const rawDt = (now - lastRafTime) / 1000;
    lastRafTime = now;
    const dt = smoothDt(rawDt);

    fpsFrames++; fpsAccum += rawDt;
    if (fpsAccum >= 0.5) {
        const fps = Math.round(fpsFrames / fpsAccum);
        fpsEl.textContent = "";
        fpsFrames = 0; fpsAccum = 0;

        if (profilerOn) {
            const profNames = t("profStats") ?? {};
            const order = ["physics","fish","pigs","clouds","buildQueue","torchLight","raycast","render","TOTAL"];
            const lines = order.map(k => {
                const v = profStats[k];
                if (v === undefined) return null;
                const ms = v.toFixed(2);
                const bar = "█".repeat(Math.min(20, Math.round(v * 4)));
                const color = v > 8 ? "#f44" : v > 3 ? "#ff0" : "#0f0";
                const label = (profNames[k] ?? k).padEnd(12);
                return `<span style="color:${color}">${label}${ms.padStart(5)}ms ${bar}</span>`;
            }).filter(Boolean);
            const fpsColor = fps >= 50 ? "#0f0" : fps >= 30 ? "#ff0" : "#f44";
            const fpsLabel = t("profFps").padEnd(12);
            const fpsLine = `<span style="color:${fpsColor}">${fpsLabel}${String(fps).padStart(5)}</span>`;
            const queueLabel = t("profQueue").padEnd(12);
            const queueInfo = `<span style="color:#aaa">${queueLabel}${String(buildQueue.length).padStart(5)}</span>`;
            const igHours = dayTime * 24;
            const hh = String(Math.floor(igHours) % 24).padStart(2,"0");
            const mm = String(Math.floor((igHours % 1) * 60)).padStart(2,"0");
            const isDay = dayTime > SUNRISE_AT && dayTime < SUNSET_AT;
            const timeIcon = isDay ? "☀" : "☾";
            const timeLabel = t("profTime").padEnd(11);
            const timeInfo = `<span style="color:#ff9">${timeIcon} ${timeLabel}${hh}:${mm}</span>`;
            profilerEl.innerHTML = `<b style='color:#fff'>${t("profTitle")}</b><br>` + fpsLine + "<br>" + lines.join("<br>") + "<br>" + queueInfo + "<br>" + timeInfo;
        }
    }

    _frameStartMs = performance.now();
    let t0, t1;

    if (worldGenDone) {
        accumTime += dt;
    } else {
        accumTime = 0; // сбрасываем накопленное время пока мир не готов
    }
    posPrev.copy(pos);
    t0 = performance.now();
    // Максимум 5 тиков за кадр — защита от «спирали смерти» после лаг-спайков
    let physIter = 0;
    while (worldGenDone && accumTime >= FIXED_DT && physIter < 5) {
        physicsTick();
        accumTime -= FIXED_DT;
        simTime   += FIXED_DT;
        physIter++;
    }
    // Если накопилось слишком много — сбрасываем остаток вместо бесконечного догона
    if (accumTime > FIXED_DT * 4) accumTime = 0;
    if (profilerOn) profMark("physics", performance.now() - t0);

    // scheduleChunks — один раз за кадр, не внутри цикла физики
    // В мультиплеере не генерим мир пока сервер не прислал seed (init)
    if (!isMultiplayer || _worldSeed !== 0) scheduleChunks(pos.x, pos.z);

    const alpha = Math.min(accumTime / FIXED_DT, 1);
    interpPos.lerpVectors(posPrev, pos, alpha);
    camera.position.copy(interpPos);
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Координаты + список игроков в HUD
    hudCoords.textContent = `X:${Math.round(pos.x)} \u00a0 Y:${Math.round(feetY())} \u00a0 Z:${Math.round(pos.z)}`;
    if (showPlayers && otherPlayers.size > 0) {
        let lines = "";
        for (const [, p] of otherPlayers) {
            const pname = p.name || "?";
            lines += `${pname}: ${Math.round(p.cx)},${Math.round(p.cy)},${Math.round(p.cz)}\n`;
        }
        hudPlayers.textContent = lines.trimEnd();
    } else {
        hudPlayers.textContent = "";
    }

    // Оверлеи + динамический туман
    const headInWater = isWaterAt(Math.round(interpPos.x), Math.round(interpPos.y), Math.round(interpPos.z));
    const headInLava  = isLavaAt (Math.round(interpPos.x), Math.round(interpPos.y), Math.round(interpPos.z));
    underwaterDiv.style.display  = headInWater ? "block" : "none";
    lavaOverlayDiv.style.display = headInLava  ? "block" : "none";
    // Когда камера внутри воды — прячем водный mesh: иначе видны границы
    // каждого водного куба (двойная прозрачность на стыках блоков).
    // Туман + underwater-оверлей дают эффект погружения и без него.
    iMesh.water.visible = !headInWater;
    // Туман под водой: синий, ближний — имитирует мутную воду.
    // Также подменяем scene.background, иначе на горизонте/наверху виден кусок неба
    // (на background туман в three.js не действует).
    if (headInWater) {
        scene.fog.color.set(0x004488);
        scene.fog.near = 4; scene.fog.far = 32;
        scene.background.set(0x004488);
    } else if (headInLava) {
        scene.fog.color.set(0x330000);
        scene.fog.near = 1; scene.fog.far = 6;
        scene.background.set(0x330000);
    } else {
        scene.fog.color.copy(_skyColor);
        scene.fog.near = 80; scene.fog.far = 160;
        scene.background.copy(_skyColor);
    }
    // День / ночь — только когда не под водой/лавой
    if (!headInWater && !headInLava) updateDayNight(dt);

    // Рыбы — LOD по дистанции
    t0 = performance.now();
    for (const fish of fishGroup) {
        const d = fish.userData;
        const lod = entityLOD(d.cx, d.cz);
        if (lod === "far") { fish.visible = false; continue; }
        fish.visible = true;
        if (lod === "mid" && (simTime * 60 | 0) % 3 !== 0) continue;
        d.angle += d.speed;
        fish.position.x = d.cx + Math.cos(d.angle) * d.radius;
        fish.position.z = d.cz + Math.sin(d.angle) * d.radius;
        fish.position.y = d.cy + Math.sin(simTime * 2 + d.wobble) * 0.1;
        fish.rotation.y = -d.angle + Math.PI / 2;
        if (lod === "near") fish.children[1].rotation.y = Math.sin(simTime * 9 + d.wobble) * 0.4;
    }
    updateAquariumFish(simTime);
    if (profilerOn) profMark("fish", performance.now() - t0);

    // Свиньи
    t0 = performance.now();
    if (catLife)  updateMice(simTime);
    else          updatePigs(simTime);
    if (profilerOn) profMark("pigs", performance.now() - t0);

    // Облака
    t0 = performance.now();
    for (const c of clouds) {
        c.position.x += c.userData.speed;
        if (c.position.x > 120) c.position.x = -120;
        const cdx = c.position.x - interpPos.x, cdz = c.position.z - interpPos.z;
        c.visible = (cdx*cdx + cdz*cdz) < 150*150;
    }
    if (profilerOn) profMark("clouds", performance.now() - t0);

    // Очередь чанков
    t0 = performance.now();
    processBuildQueue();
    if (profilerOn) profMark("buildQueue", performance.now() - t0);


    // Перестройка грязных чанков (после любых изменений блоков за этот кадр)
    t0 = performance.now();
    flushDirtyChunks();
    if (profilerOn) profMark("flushChunks", performance.now() - t0);

    // Подсветка от "факела" (только instanced-типы: water/glass/rainbow/aquarium)
    t0 = performance.now();
    updateTorchLight(interpPos.x, interpPos.y, interpPos.z);
    if (profilerOn) profMark("torchLight", performance.now() - t0);

    // Рейкаст
    t0 = performance.now();
    _rayOrig.copy(interpPos);
    _rayDir.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    const hit = castRay(_rayOrig, _rayDir, 6);
    if (hit) { highlight.visible = true; highlight.position.set(hit.entry.x, hit.entry.y, hit.entry.z); currentHit = hit; }
    else      { highlight.visible = false; currentHit = null; }
    if (profilerOn) profMark("raycast", performance.now() - t0);

    // Мультиплеер: интерполяция других игроков + отправка позиции
    mpUpdatePlayers(dt);
    mpSendMove(now);

    // Рендер
    t0 = performance.now();
    renderer.render(scene, camera);
    t1 = performance.now();
    if (profilerOn) {
        profMark("render", t1 - t0);
        profMark("TOTAL", (t1 - (now)) + rawDt * 1000 * 0); // общее время кадра
        // Считаем TOTAL как сумму всех секций
        const total = ["physics","fish","pigs","clouds","buildQueue","flushChunks","torchLight","raycast","render"]
            .reduce((s, k) => s + (profStats[k] || 0), 0);
        profStats["TOTAL"] = total;
    }
}

function hideSplash() {
    splashEl.style.transition = "opacity 0.4s";
    splashEl.style.opacity = "0";
    splashEl.style.pointerEvents = "none";
    setTimeout(() => { splashEl.style.display = "none"; }, 420);
}

async function startGame(loadSave, withMP = false) {
    isMultiplayer = withMP;
    RENDER_DIST = sliderToChunks(+spRd.value);
    applyCatLife(); // применяем после создания pigGroup/mouseGroup
    hideSplash();
    requestPersistentStorage();
    if (loadSave) {
        const saved = await initWorldFromDB();
        if (saved?.playerPos) {
            const p = saved.playerPos;
            pos.set(p.x, p.y, p.z);
            posPrev.set(p.x, p.y, p.z);
            camera.position.set(p.x, p.y, p.z);
            yaw   = p.yaw   ?? 0;
            pitch = p.pitch ?? 0;
            scheduleChunks(p.x, p.z, true);
        } else {
            scheduleChunks(0, 0, true);
        }
        worldGenDone = true;
        await loadWorldDelta(saved);
    } else if (withMP) {
        // Seed и позиция придут от сервера в init — ждём
        worldGenDone = false;
    } else {
        initWorldSeed(Math.random() * 0xFFFFFFFF | 0);
        spawnPigs();
        anchorDayTime(0.28); // утро при старте новой игры
        // Ищем точку спавна вне воды — спираль от (0,0)
        let spawnX = 0, spawnZ = 0;
        outer: for (let r = 0; r <= 20; r++) {
            for (let dx = -r; dx <= r; dx++) {
                for (let dz = -r; dz <= r; dz++) {
                    if (Math.abs(dx) !== r && Math.abs(dz) !== r) continue;
                    const sx = dx * 3, sz = dz * 3;
                    if (!inLake(sx, sz) && !inSand(sx, sz)) {
                        spawnX = sx; spawnZ = sz; break outer;
                    }
                }
            }
        }
        const spawnY = Math.max(terrainHeight(spawnX, spawnZ), WATER_LEVEL + 1) + 3;
        pos.set(spawnX, spawnY, spawnZ);
        posPrev.set(spawnX, spawnY, spawnZ);
        camera.position.set(spawnX, spawnY, spawnZ);
        scheduleChunks(spawnX, spawnZ, true);
        worldGenDone = true;
    }
    // Подключаем мультиплеер только если явно выбран
    if (withMP) {
        const mpUrl  = (localStorage.getItem("mishaCraft_serverUrl") || "").trim();
        const mpName = (localStorage.getItem("mishaCraft_playerName") || "Player").trim();
        if (mpUrl) connectMultiplayer(mpUrl, mpName);
    }

    requestAnimationFrame(animate);
}

async function onReady() {
    const pieceOrder = ["pr","po","py","pg","pb"];
    let delay = 0.1;
    pieceOrder.forEach(id => {
        document.querySelectorAll(`#${id} > g`).forEach(block => {
            block.style.animationDelay = delay.toFixed(2) + "s";
            block.style.transformOrigin = "center center";
            delay += 0.12;
        });
        delay += 0.15;
    });

    splashMenu.classList.add("visible");

    let hasSave = false;
    try {
        const saved = await dbGet("delta");
        hasSave = !!(saved?.seed != null);
    } catch(e) { /* БД недоступна */ }

    if (hasSave) {
        btnLoadGame.disabled = false;
        menuHint.dataset.state = "hasSave";
        menuHint.textContent = t("hasSave");
    } else {
        menuHint.dataset.state = "noSave";
        menuHint.textContent = t("noSave");
    }

    btnNewGame.addEventListener("click",  () => startGame(false));
    btnLoadGame.addEventListener("click", () => startGame(true));
    document.getElementById("btn-multiplayer").addEventListener("click", () => {
        const mpUrl = (localStorage.getItem("mishaCraft_serverUrl") || "").trim();
        if (mpUrl) {
            startGame(false, true);
        } else {
            // Нет адреса — открыть настройки
            openSettings();
            // Скроллим к полю адреса
            setTimeout(() => document.getElementById("sp-server-url").focus(), 300);
        }
    });
}

window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

const IS_CORDOVA = typeof window.cordova !== "undefined" || typeof window.PhoneGap !== "undefined";
if (IS_CORDOVA) {
    document.addEventListener("deviceready", () => {
        btnExit.style.display = "";
        onReady();
    }, { once: true });
} else {
    onReady();
}
