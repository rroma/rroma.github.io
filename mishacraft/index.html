<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="initial-scale=1, width=device-width, height=device-height, viewport-fit=cover">
<title>MishaCraft</title>
<link rel="icon" type="image/png" href="./img/favicon.ico">
<style>
* { box-sizing: border-box; }
body { margin: 0; overflow: hidden; background: #000; }

/* ── ЗАСТАВКА ── */
#splash {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
}
/* Автофейд убран — сплэш закрывается только после выбора в меню */

#splash-svg g[id^="pb"] > g,
#splash-svg g[id^="pr"] > g,
#splash-svg g[id^="po"] > g,
#splash-svg g[id^="py"] > g,
#splash-svg g[id^="pg"] > g { opacity: 0; animation: blockPop 0.15s ease forwards; }

#splash-menu {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    opacity: 0; transition: opacity 0.5s;
    pointer-events: none;
    margin-top: 20px;
}
#splash-menu.visible { opacity: 1; pointer-events: auto; }

.menu-btn {
    font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold;
    color: #fff; letter-spacing: 2px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 12px 36px;
    cursor: pointer; user-select: none;
    width: 240px; text-align: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.menu-btn:hover  { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }
.menu-btn:active { transform: translateY(0); }
.menu-btn.new-game  { border-color: rgba(80,200,100,0.6); }
.menu-btn.new-game:hover  { background: rgba(80,200,100,0.2); border-color: #5c8; }
.menu-btn.load-game { border-color: rgba(80,160,255,0.6); }
.menu-btn.load-game:hover { background: rgba(80,160,255,0.2); border-color: #5af; }
.menu-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

#menu-hint {
    font-family: monospace; font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px; min-height: 18px; text-align: center;
}

@keyframes blockPop {
    0%   { opacity:0; transform: scale(0.4) translateY(-20px); }
    70%  { opacity:1; transform: scale(1.15) translateY(2px); }
    100% { opacity:1; transform: scale(1) translateY(0); }
}

#crosshair {
    position: fixed; top: 50%; left: 50%;
    width: 14px; height: 14px; margin: -7px 0 0 -7px;
    pointer-events: none;
}
#crosshair::before, #crosshair::after {
    content: ""; position: absolute; background: rgba(255,255,255,0.85);
}
#crosshair::before { width: 2px; height: 14px; left: 6px; top: 0; }
#crosshair::after  { width: 14px; height: 2px; left: 0; top: 6px; }

#hud {
    position: fixed; top: 10px; left: 10px;
    color: #fff; font-family: monospace; font-size: 13px;
    text-shadow: 1px 1px 3px #000; pointer-events: none; line-height: 1.7;
}
#fps {
    position: fixed; top: 10px; right: 14px;
    color: #0f0; font-family: monospace; font-size: 15px; font-weight: bold;
    text-shadow: 1px 1px 3px #000; pointer-events: none;
}
#inventory {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); display: flex; gap: 6px;
    background: rgba(0,0,0,0.55); padding: 6px 8px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
}
.slot {
    position: relative;
    width: 52px; height: 52px;
    border: 2px solid rgba(255,255,255,0.25); border-radius: 6px;
    cursor: pointer; overflow: visible;
    background: rgba(0,0,0,0.4);
    transition: border-color .1s, transform .1s;
}
.slot canvas { display: block; width: 52px; height: 52px; border-radius: 4px; }
.slot:hover { border-color: rgba(255,255,255,0.7); transform: translateY(-2px); }
.slot.active {
    border-color: #ffe033 !important;
    box-shadow: 0 0 0 2px #ffe03366, 0 0 14px #ffe03388;
    transform: translateY(-3px);
}
.slot .badge {
    position: absolute; bottom: 2px; right: 4px;
    font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold;
    color: #fff; text-shadow: 0 0 3px #000, 1px 1px 0 #000;
    pointer-events: none; line-height: 1;
}

#underwater {
    position: fixed; inset: 0;
    background: rgba(0,50,160,0.38); pointer-events: none; display: none;
}
#lava-overlay {
    position: fixed; inset: 0;
    background: rgba(255,80,0,0.7); pointer-events: none; display: none;
}
#loading {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-family: monospace; font-size: 12px;
    pointer-events: none;
}
/* ─── МОБИЛЬНЫЕ КОНТРОЛЫ ─────────────────────────────────────────────── */
#mobile-controls { display: none; }

@media (pointer: coarse) {
    #mobile-controls { display: block; }
}

/* Джойстик — левый нижний угол */
#joystick-zone {
    position: fixed; left: 24px; bottom: 90px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.18);
    touch-action: none;
}
#joystick-knob {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    border: 2px solid rgba(255,255,255,0.6);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: background .1s;
}

/* Кнопка прыжка — правый нижний угол */
#btn-jump {
    position: fixed; right: 28px; bottom: 110px;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.22);
    border: 2px solid rgba(255,255,255,0.5);
    color: #fff; font-size: 28px; line-height: 70px; text-align: center;
    touch-action: none; user-select: none; cursor: pointer;
}
#btn-jump:active { background: rgba(255,255,255,0.45); }

/* Кнопки действий — сломать и поставить */
#btn-break {
    position: fixed; right: 110px; bottom: 195px;
    width: 62px; height: 62px; border-radius: 50%;
    background: rgba(220,80,60,0.35);
    border: 2px solid rgba(255,120,100,0.7);
    color: #fff; font-size: 22px; line-height: 62px; text-align: center;
    touch-action: none; user-select: none; cursor: pointer;
}
#btn-break:active { background: rgba(220,80,60,0.7); }

#btn-place {
    position: fixed; right: 28px; bottom: 195px;
    width: 62px; height: 62px; border-radius: 50%;
    background: rgba(60,180,80,0.35);
    border: 2px solid rgba(100,220,120,0.7);
    color: #fff; font-size: 22px; line-height: 62px; text-align: center;
    touch-action: none; user-select: none; cursor: pointer;
}
#btn-place:active { background: rgba(60,180,80,0.7); }

#btn-save {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 30;
    background: rgba(30,30,30,0.75);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    color: #fff; font-size: 18px;
    padding: 4px 14px 4px 10px;
    cursor: pointer; user-select: none;
    letter-spacing: 1px;
    transition: background 0.15s, border-color 0.15s;
}
#btn-save:hover { background: rgba(60,60,60,0.9); border-color: rgba(255,255,255,0.5); }
#btn-save:active { background: rgba(0,180,80,0.5); }
#btn-save.saving { border-color: #0f0; }

#save-toast {
    position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
    z-index: 30;
    background: rgba(0,0,0,0.72);
    color: #0f0; font-family: monospace; font-size: 13px;
    padding: 4px 14px; border-radius: 6px;
    pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
    white-space: nowrap;
}
#save-toast.visible { opacity: 1; }

/* Зона свайпа камеры — вся правая половина экрана */
#look-zone {
    position: fixed; right: 0; top: 0;
    width: 50%; height: 100%;
    touch-action: none;
    z-index: 10;
}

/* Все кнопки поверх look-zone */
#btn-jump, #btn-break, #btn-place, #joystick-zone, #inventory {
    z-index: 20;
}
</style>
</head>

<script src="three.min.js"></script>
<script>
"use strict";

// ─── СЦЕНА ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 80, 160);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.3, 300);
camera.position.set(0, 20, 12);
camera.rotation.order = "YXZ";

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff4cc, 1.2);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(512, 512);
Object.assign(sun.shadow.camera, { left: -70, right: 70, top: 70, bottom: -70, near: 0.5, far: 200 });
scene.add(sun);

// ─── INSTANCED MESH ──────────────────────────────────────────────────────────
const BGEO = new THREE.BoxGeometry(1, 1, 1);
const MAX_INST = 200000; // дефолт
const MAX_INST_BY_TYPE = {
    stone: 20000,
    grass: 60000,
    sand:  30000,
    water: 30000,
    lava:  20000,
    wood:  15000,
    leaf:  20000,
    rainbow: 10000,
    aquarium: 5000,
    glass: 5000,
};

// Радуга: одна текстура с 7 горизонтальными полосами на кубе
const RAINBOW_COLORS = [0xff0000, 0xff7700, 0xffff00, 0x00cc00, 0x0000ff, 0x8800cc, 0xee00aa];
function makeRainbowTexture() {
    const size = 56; // 7 полос по 8px
    const canvas = document.createElement("canvas");
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    const stripeH = size / 7;
    const hexColors = ["#ff0000","#ff7700","#ffff00","#00cc00","#0000ff","#8800cc","#ee00aa"];
    for (let i = 0; i < 7; i++) {
        ctx.fillStyle = hexColors[i];
        ctx.fillRect(0, i * stripeH, size, stripeH);
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
}

const BLOCK_TYPES  = ["grass","stone","wood","leaf","sand","water","lava","rainbow","aquarium","glass"];
const BLOCK_COLOR  = {
    grass:0x4caf50, stone:0x888888, wood:0x8b5a2b, leaf:0x2e7d32, sand:0xe2c97e,
    water:0x1565c0, lava:0xff4500, rainbow:0xffffff, aquarium:0x88ddff, glass:0xddf4ff,
};

const iMesh = {};
for (const t of BLOCK_TYPES) {
    const isWater   = t === "water";
    const isLava    = t === "lava";
    const isRainbow = t === "rainbow";
    const isAquarium = t === "aquarium";
    const isGlass   = t === "glass";
    const mat = new THREE.MeshLambertMaterial({
        color: BLOCK_COLOR[t],
        map: isRainbow ? makeRainbowTexture() : null,
        transparent: isWater || isAquarium || isGlass,
        opacity: isWater ? 0.62 : isAquarium ? 0.35 : isGlass ? 0.28 : 1,
        depthWrite: !isWater && !isAquarium && !isGlass,
        polygonOffset: isWater || isAquarium || isGlass,
        polygonOffsetFactor: (isWater || isAquarium || isGlass) ? -1 : 0,
        polygonOffsetUnits:  (isWater || isAquarium || isGlass) ? -1 : 0,
        ...(isLava ? { emissive: new THREE.Color(0xff4500), emissiveIntensity: 0.6 } : {}),
        ...(isRainbow ? { emissive: new THREE.Color(0x888888), emissiveIntensity: 0.3 } : {}),
        ...(isAquarium ? { emissive: new THREE.Color(0x0088cc), emissiveIntensity: 0.25 } : {}),
        ...(isGlass ? { emissive: new THREE.Color(0xaaddff), emissiveIntensity: 0.12 } : {}),
        vertexColors: false,
    });
    const maxInst = MAX_INST_BY_TYPE[t] || MAX_INST;
    const im = new THREE.InstancedMesh(BGEO, mat, maxInst);
    im.castShadow    = !isWater && !isRainbow && !isAquarium && !isGlass;
    im.receiveShadow = !isWater && !isAquarium && !isGlass;
    im.count = 0;
    im.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    im.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(maxInst * 3).fill(1), 3);
    im.instanceColor.setUsage(THREE.DynamicDrawUsage);
    im.frustumCulled = false;
    scene.add(im);
    iMesh[t] = im;
}

// ─── ОСВЕЩЕНИЕ ПО ГЛУБИНЕ ────────────────────────────────────────────────────
// Яркость блока определяется двумя факторами:
//   1. Глубина (y): чем ниже — тем темнее. y=0 → 1.0, y=-50 → 0.15
//   2. Skylight: если над блоком есть хотя бы одна открытая ячейка до неба —
//      блок получает бонус яркости (свет "падает сверху через шахту")
//
// Skylight считается через простой raycast вверх по blockMap — без тяжёлой
// физики. Обновляется только при изменении блоков рядом с игроком.

const SURFACE_Y   = 0;
const DEEP_Y      = -50;
const MIN_BRIGHT  = 0.38;   // было 0.12 — теперь даже в глубокой шахте видно
const SKY_BONUS   = 0.55;   // было 0.35 — открытое небо сверху даёт много света
const SKY_CHECK_H = 40;

// Факел игрока: блоки в радиусе TORCH_R от камеры получают дополнительный свет.
// Обновляется каждый кадр для ближайших блоков.
const TORCH_R      = 5;     // радиус подсветки
const TORCH_POWER  = 0.55;  // максимальная добавка от "факела"

// skyColumn[`x,z`] = наибольший Y твёрдого блока в этой колонке.
// hasSkyAbove(x,y,z) == (y >= skyColumn) — O(1) вместо O(40).
const skyColumn = new Map();
function ckey(x, z) { return `${Math.round(x)},${Math.round(z)}`; }

function skyColumnAdd(x, y, z) {
    const k = ckey(x, z);
    const cur = skyColumn.get(k);
    if (cur === undefined || y > cur) skyColumn.set(k, y);
}

function skyColumnRemove(x, y, z) {
    const k = ckey(x, z);
    // Если удаляемый блок был вершиной колонки — ищем новый максимум вниз
    const cur = skyColumn.get(k);
    if (cur !== y) return; // не вершина — ничего не меняется
    let newTop = undefined;
    for (let cy = y - 1; cy >= y - SKY_CHECK_H * 2; cy--) {
        if (blockMap.has(bkey(x, cy, z))) { newTop = cy; break; }
    }
    if (newTop === undefined) skyColumn.delete(k);
    else skyColumn.set(k, newTop);
}

function depthBrightness(y) {
    const t = Math.max(0, Math.min(1, (y - DEEP_Y) / (SURFACE_Y - DEEP_Y)));
    return MIN_BRIGHT + Math.pow(t, 0.7) * (1 - MIN_BRIGHT);
}

function hasSkyAbove(x, y, z) {
    const top = skyColumn.get(ckey(x, z));
    // нет ни одного блока в колонке, или самый верхний блок ниже y → небо открыто
    return top === undefined || top <= y;
}

function blockBrightness(x, y, z) {
    const entry = blockMap.get(bkey(x, y, z));
    if (entry && (entry.type === "lava" || entry.type === "rainbow")) return 1.0;
    const base = depthBrightness(y);
    const sky  = hasSkyAbove(x, y, z) ? SKY_BONUS : 0;
    return Math.min(1.0, base + sky);
}

// Подсветка от "факела" игрока — обновляем блоки вокруг каждые N кадров
let torchFrame = 0;
function updateTorchLight(px, py, pz) {
    torchFrame++;
    if (torchFrame % 3 !== 0) return;
    const r = TORCH_R;
    const ipx = Math.round(px), ipy = Math.round(py), ipz = Math.round(pz);
    const dirty = new Set();
    for (let x = ipx - r; x <= ipx + r; x++) {
        for (let y = ipy - r; y <= ipy + r; y++) {
            for (let z = ipz - r; z <= ipz + r; z++) {
                const entry = blockMap.get(bkey(x, y, z));
                if (!entry) continue;
                const dx = x - px, dy = y - py, dz = z - pz;
                const dist2 = dx*dx + dy*dy + dz*dz;
                if (dist2 > r*r) continue;
                const dist = Math.sqrt(dist2);
                const torchAdd = TORCH_POWER * Math.max(0, 1 - dist / r) ** 2;
                const base = blockBrightness(x, y, z);
                const br = Math.min(1.0, base + torchAdd);
                _brightColor.setRGB(br, br, br);
                iMesh[entry.type].setColorAt(entry.idx, _brightColor);
                dirty.add(entry.type);
            }
        }
    }
    for (const t of dirty) iMesh[t].instanceColor.needsUpdate = true;
}

// Применить яркость к инстансу (без GPU flush — вызывай flushColors после батча)
const _brightColor = new THREE.Color();
function applyBrightness(type, idx, x, y, z) {
    const br = blockBrightness(x, y, z);
    _brightColor.setRGB(br, br, br);
    iMesh[type].setColorAt(idx, _brightColor);
}

// Сбросить флаги GPU для всех мешей у которых менялись цвета
const _colorDirtyTypes = new Set();
function markColorDirty(type) { _colorDirtyTypes.add(type); }
function flushColors() {
    for (const t of _colorDirtyTypes) iMesh[t].instanceColor.needsUpdate = true;
    _colorDirtyTypes.clear();
}

// Пересчитать skylight и цвета блоков в радиусе вокруг точки
// (вызывается при ломании/постановке блока)
function refreshLightAround(cx, cy, cz, radius) {
    const ix = Math.round(cx), iy = Math.round(cy), iz = Math.round(cz);
    for (let x = ix - radius; x <= ix + radius; x++) {
        for (let y = iy - radius; y <= iy + radius + SKY_CHECK_H; y++) {
            for (let z = iz - radius; z <= iz + radius; z++) {
                const entry = blockMap.get(bkey(x, y, z));
                if (!entry) continue;
                applyBrightness(entry.type, entry.idx, x, y, z);
                markColorDirty(entry.type);
            }
        }
    }
    flushColors();
}

const _dummy = new THREE.Object3D();
const _zero  = new THREE.Matrix4().makeScale(0, 0, 0);

const blockMap = new Map();
const waterSet = new Set();
const lavaSet  = new Set();
const freeList = {};
for (const t of BLOCK_TYPES) freeList[t] = [];
// solidEntries removed — DDA не нуждается в списке солидных блоков

// ─── СИСТЕМА СОХРАНЕНИЯ ──────────────────────────────────────────────────────
// Храним только дельту: блоки поставленные игроком (placed) и снесённые (removed).
// При загрузке: сначала генерируем мир, потом накатываем дельту.

const userPlaced  = new Map();   // bkey → {x,y,z,type}  — поставил игрок
const userRemoved = new Set();   // bkey              — снёс игрок (был генерированным)

// Метки: какие блоки пришли из генератора (не от игрока)
const worldGenKeys = new Set();
let   worldGenDone = false;      // true после загрузки стартовых чанков

let _isSaving = false;
const saveBtn   = document.getElementById("btn-save");
const saveToast = document.getElementById("save-toast");

function showToast(msg, color = "#0f0", ms = 2000) {
    saveToast.textContent = msg;
    saveToast.style.color = color;
    saveToast.classList.add("visible");
    clearTimeout(saveToast._t);
    saveToast._t = setTimeout(() => saveToast.classList.remove("visible"), ms);
}

// ── IndexedDB helpers (Cordova-safe) ─────────────────────────────────────────
// На Android 13/14 через Cordova WebView:
//  - IndexedDB работает, но открывать нужно ПОСЛЕ deviceready
//  - Запрашиваем persistent storage чтобы Android не вычистил данные
//  - Кэшируем открытый экземпляр db чтобы не открывать заново на каждую операцию
//  - Используем tx.oncomplete вместо req.onsuccess для write-транзакций
//    (некоторые WebView закрывают транзакцию до того как req.onsuccess сработает)

const DB_NAME    = "mishaCraft";
const DB_VERSION = 1;
const STORE_NAME = "world";
let   _dbInstance = null;

// Запросить persistent quota (важно на Android — без этого ОС может вычистить данные)
function requestPersistentStorage() {
    if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persist().then(granted => {
            console.log("Persistent storage:", granted ? "granted" : "denied");
        }).catch(() => {});
    }
}

function openDB() {
    if (_dbInstance) return Promise.resolve(_dbInstance);
    return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };
        req.onsuccess = e => {
            _dbInstance = e.target.result;
            // Если соединение внезапно закрылось (Android может убить WebView) — сбрасываем кэш
            _dbInstance.onclose = () => { _dbInstance = null; };
            _dbInstance.onerror = e => console.error("DB error:", e.target.error);
            res(_dbInstance);
        };
        req.onerror   = e => rej(e.target.error);
        req.onblocked = () => {
            // Другая вкладка держит старую версию БД
            _dbInstance = null;
            rej(new Error("IDB blocked"));
        };
    });
}

async function dbPut(key, value) {
    const db = await openDB();
    return new Promise((res, rej) => {
        let tx;
        try {
            tx = db.transaction(STORE_NAME, "readwrite");
        } catch(e) {
            // Транзакция не открылась (db закрыта) — сбрасываем и пробуем переоткрыть
            _dbInstance = null;
            return rej(e);
        }
        tx.oncomplete = () => res();
        tx.onerror    = e => rej(e.target.error);
        tx.onabort    = e => rej(e.target.error);
        tx.objectStore(STORE_NAME).put(value, key);
    });
}

async function dbGet(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
        let tx;
        try {
            tx = db.transaction(STORE_NAME, "readonly");
        } catch(e) {
            _dbInstance = null;
            return rej(e);
        }
        tx.onerror = e => rej(e.target.error);
        const req  = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = e => res(e.target.result);
        req.onerror   = e => rej(e.target.error);
    });
}

// ── Сохранение ───────────────────────────────────────────────────────────────
async function saveWorld() {
    if (_isSaving) return;
    _isSaving = true;
    saveBtn.classList.add("saving");
    saveBtn.textContent = "⏳";
    try {
        const placed  = [...userPlaced.values()];
        const removed = [...userRemoved];
        await dbPut("delta", { seed: _worldSeed, placed, removed });
        const total = placed.length + removed.length;
        showToast(`✓ Сохранено (${total} изменений)`);
    } catch(e) {
        showToast("✗ Ошибка сохранения", "#f44");
        console.error("saveWorld:", e);
    } finally {
        _isSaving = false;
        saveBtn.classList.remove("saving");
        saveBtn.textContent = "💾";
    }
}

// ── Загружаем seed и дельту; вызывается ДО генерации мира ────────────────────
async function initWorldFromDB() {
    try {
        const saved = await dbGet("delta");
        const seed  = saved?.seed ?? (Math.random() * 0xFFFFFFFF | 0);
        initWorldSeed(seed);
        return saved; // вернём для накатки дельты после генерации
    } catch(e) {
        console.error("initWorldFromDB:", e);
        initWorldSeed(Math.random() * 0xFFFFFFFF | 0);
        return null;
    }
}

async function loadWorldDelta(saved) {
    try {
        const delta = saved;
        if (!delta) return;
        let applied = 0;

        // Сначала убираем блоки которые игрок снёс
        for (const k of delta.removed) {
            const entry = blockMap.get(k);
            if (entry) { removeBlock(entry); applied++; }
            userRemoved.add(k);
        }

        // Потом ставим блоки которые игрок добавил
        for (const b of delta.placed) {
            const k = bkey(b.x, b.y, b.z);
            const existing = blockMap.get(k);
            if (existing) removeBlock(existing);
            addBlock(b.x, b.y, b.z, b.type);
            userPlaced.set(k, { x: b.x, y: b.y, z: b.z, type: b.type });
            applied++;
        }

        flushColors();
        if (applied > 0) showToast(`↑ Загружено (${applied} изменений)`, "#8cf");
    } catch(e) {
        console.error("loadWorldDelta:", e);
    }
}

let selected = "grass";

function bkey(x, y, z) { return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }

function addBlock(x, y, z, type) {
    type = type || "grass";
    const k = bkey(x, y, z);
    if (blockMap.has(k)) { addBlock._lastFail = `occupied`; return; }
    const im = iMesh[type];
    if (!im) { addBlock._lastFail = `no_mesh`; return; }
    const limit = MAX_INST_BY_TYPE[type] || MAX_INST;
    let idx;
    if (freeList[type].length > 0) {
        idx = freeList[type].pop();
    } else {
        if (im.count >= limit) { addBlock._lastFail = `limit_${im.count}/${limit}`; return; }
        idx = im.count++;
    }
    addBlock._lastFail = null;
    const rx = Math.round(x), ry = Math.round(y), rz = Math.round(z);
    _dummy.position.set(rx, ry, rz);
    _dummy.scale.set(1, 1, 1);
    _dummy.updateMatrix();
    im.setMatrixAt(idx, _dummy.matrix);
    im.instanceMatrix.needsUpdate = true;
    const entry = { x: rx, y: ry, z: rz, type, idx };
    blockMap.set(k, entry);
    if (type === "water") waterSet.add(k);
    else if (type === "lava") lavaSet.add(k);
    // (solidEntries removed)

    // Яркость по глубине + skylight
    applyBrightness(type, idx, rx, ry, rz);
    markColorDirty(type);
    // Новый блок может стать вершиной своей колонки
    skyColumnAdd(rx, ry, rz);
    // Пометить как мировой блок если генерация ещё идёт
    if (!worldGenDone) worldGenKeys.add(k);
}

function removeBlock(entry) {
    const k = bkey(entry.x, entry.y, entry.z);
    const data = blockMap.get(k);
    if (!data) return;
    iMesh[data.type].setMatrixAt(data.idx, _zero);
    iMesh[data.type].instanceMatrix.needsUpdate = true;
    freeList[data.type].push(data.idx);
    blockMap.delete(k);
    waterSet.delete(k);
    lavaSet.delete(k);

    // Пробитое отверстие открывает небо снизу — обновляем колонку и свет
    skyColumnRemove(data.x, data.y, data.z);
    refreshLightAround(data.x, data.y, data.z, 1);
}

function isSolid(x, y, z)   { const e = blockMap.get(bkey(x,y,z)); return e !== undefined && e.type !== "water" && e.type !== "lava"; }
function isWaterAt(x, y, z) { return waterSet.has(bkey(x, y, z)); }
function isLavaAt(x, y, z)  { return lavaSet.has(bkey(x, y, z)); }

// ─── ШУМ ПЕРЛИНА ─────────────────────────────────────────────────────────────
// Используем seeded RNG чтобы карта была одинаковой при каждом запуске.
// seed сохраняется в IndexedDB при первом запуске и загружается при последующих.

let _worldSeed = 0;

// Mulberry32 — быстрый seeded PRNG с хорошим распределением
function makeRng(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// rng будет заменён на seeded версию в initWorldSeed()
let rng = Math.random;

function initWorldSeed(seed) {
    _worldSeed = seed;
    rng = makeRng(seed);
    // Инициализируем таблицу перестановок Перлина используя seeded RNG
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    for (let i = 255; i > 0; i--) {
        const j = rng() * (i + 1) | 0;
        const tmp = p[i]; p[i] = p[j]; p[j] = tmp;
    }
    for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
}

const perm = new Uint8Array(512);
function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lrp(a, b, t) { return a + t * (b - a); }
function grad2(h, x, y) { const u = h < 8 ? x : y, v = h < 4 ? y : x; return ((h & 1) ? -u : u) + ((h & 2) ? -v : v); }
function noise2(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = fade(x), v = fade(y), a = perm[X] + Y, b = perm[X + 1] + Y;
    return lrp(lrp(grad2(perm[a],     x,     y), grad2(perm[b],     x-1, y    ), u),
               lrp(grad2(perm[a + 1], x,     y-1), grad2(perm[b+1], x-1, y-1), u), v);
}
function fbm(x, y, oct) {
    let v = 0, a = 1, f = 1, s = 0;
    for (let i = 0; i < oct; i++) { v += a * noise2(x * f, y * f); s += a; a *= 0.5; f *= 2; }
    return v / s;
}

// ─── ГЕНЕРАЦИЯ МИРА ──────────────────────────────────────────────────────────
const WATER_LEVEL = 0;
const LAKE_DEPTH  = 5;
const DEEP_LIMIT  = -50; // лава ниже этого уровня
const RAINBOW_START_Y = -10; // радуга начинается с этой глубины

const LAKES = [
    { x:   0, z:   0, r: 12 },
    { x:  80, z:  40, r: 16 },
    { x: -70, z:  60, r: 10 },
    { x:  30, z: -90, r: 14 },
    { x: -60, z: -50, r: 18 },
];

function terrainHeight(x, z) {
    const mountains = fbm(x * 0.008 + 5,  z * 0.008 + 5,  6) * 28;
    const hills     = fbm(x * 0.025 + 50, z * 0.025 + 50, 4) * 8;
    const detail    = fbm(x * 0.07  + 200, z * 0.07 + 200, 3) * 2;
    return Math.floor(mountains + hills + detail);
}

function lakeVal(x, z) {
    let minVal = Infinity;
    for (const lk of LAKES) {
        const dx = x - lk.x, dz = z - lk.z;
        const dist = Math.sqrt(dx*dx + dz*dz) - lk.r - fbm(x*0.15 + lk.x, z*0.15 + lk.z, 4) * 6;
        if (dist < minVal) minVal = dist;
    }
    return minVal;
}
function inLake(x, z) { return lakeVal(x, z) < 0; }
function inSand(x, z) { return lakeVal(x, z) < 4 && !inLake(x, z); }

// Псевдослучайный хэш по координатам — стабильный между кадрами
function coordHash(x, y, z) {
    let h = Math.round(x) * 374761393 + Math.round(y) * 1234567891 + Math.round(z) * 987654321;
    h = ((h ^ (h >> 13)) * 1540483477) & 0x7fffffff;
    return h;
}

// Тип блока на глубине y (подземный слой)
function undergroundType(x, y, z) {
    if (y <= DEEP_LIMIT) return "lava";
    // y >= -10: верхний слой — всегда сплошной камень, никаких дыр
    if (y >= RAINBOW_START_Y) return "stone";
    // y < -10: камень + каждый 15-й случайный радужный
    const h = coordHash(x, y, z);
    if (h % 15 === 0) return "rainbow";
    return "stone";
}

// ─── ЧАНКИ ───────────────────────────────────────────────────────────────────
const CHUNK_SIZE  = 10;
const RENDER_DIST = 4;
const WORLD_LIMIT = 30;

const loadedChunks = new Map();
let buildQueue = [];

function chunkKey(cx, cz) { return `${cx},${cz}`; }

function generateChunk(cx, cz) {
    const x0 = cx * CHUNK_SIZE, z0 = cz * CHUNK_SIZE;
    for (let dx = 0; dx < CHUNK_SIZE; dx++) {
        for (let dz = 0; dz < CHUNK_SIZE; dz++) {
            const x = x0 + dx, z = z0 + dz;
            const h = terrainHeight(x, z);

            if (inLake(x, z)) {
                const bottom = Math.min(h, WATER_LEVEL - LAKE_DEPTH);
                for (let y = DEEP_LIMIT; y < bottom; y++) addBlock(x, y, z, undergroundType(x, y, z));
                addBlock(x, bottom, z, "sand");
                for (let y = bottom + 1; y <= WATER_LEVEL; y++) addBlock(x, y, z, "water");
            } else if (inSand(x, z)) {
                const sy = Math.max(h, WATER_LEVEL + 1);
                for (let y = DEEP_LIMIT; y < sy; y++) addBlock(x, y, z, undergroundType(x, y, z));
                addBlock(x, sy, z, "sand");
            } else {
                const top = Math.max(h, WATER_LEVEL + 1);
                for (let y = DEEP_LIMIT; y < top; y++) addBlock(x, y, z, undergroundType(x, y, z));
                const surfaceType = top >= 18 ? "stone" : "grass";
                addBlock(x, top, z, surfaceType);
                if (surfaceType === "grass" && rng() < 0.035) {
                    const th = 3 + (rng() < 0.3 ? 1 : 0);
                    for (let y = 1; y <= th; y++) addBlock(x, top + y, z, "wood");
                    for (let lx = -1; lx <= 1; lx++)
                        for (let lz = -1; lz <= 1; lz++)
                            addBlock(x + lx, top + th + 1, z + lz, "leaf");
                    addBlock(x, top + th + 2, z, "leaf");
                }
            }
        }
    }
}

// undergroundType теперь учитывает абсолютную глубину:
// y >= -10 (верхние 10 блоков под поверхностью) — всегда камень, без дыр
// y < -10  — камень + каждый 15-й радужный
// y <= DEEP_LIMIT — лава

function unloadChunk(cx, cz) {
    const x0 = cx * CHUNK_SIZE, z0 = cz * CHUNK_SIZE;
    for (let dx = 0; dx < CHUNK_SIZE; dx++) {
        for (let dz = 0; dz < CHUNK_SIZE; dz++) {
            for (let y = DEEP_LIMIT - 1; y <= 45; y++) {
                const k = bkey(x0 + dx, y, z0 + dz);
                const entry = blockMap.get(k);
                if (!entry) continue;
                iMesh[entry.type].setMatrixAt(entry.idx, _zero);
                iMesh[entry.type].instanceMatrix.needsUpdate = true;
                freeList[entry.type].push(entry.idx);
                blockMap.delete(k);
                waterSet.delete(k);
                lavaSet.delete(k);
            }
        }
    }
}

function scheduleChunks(px, pz) {
    const pcx = Math.floor(px / CHUNK_SIZE);
    const pcz = Math.floor(pz / CHUNK_SIZE);
    for (const [k] of loadedChunks) {
        const [cx, cz] = k.split(",").map(Number);
        if (Math.abs(cx - pcx) > RENDER_DIST + 1 || Math.abs(cz - pcz) > RENDER_DIST + 1) {
            unloadChunk(cx, cz); loadedChunks.delete(k);
        }
    }
    const needed = [];
    for (let dcx = -RENDER_DIST; dcx <= RENDER_DIST; dcx++) {
        for (let dcz = -RENDER_DIST; dcz <= RENDER_DIST; dcz++) {
            const cx = pcx + dcx, cz = pcz + dcz;
            if (Math.abs(cx) > WORLD_LIMIT || Math.abs(cz) > WORLD_LIMIT) continue;
            const k = chunkKey(cx, cz);
            if (!loadedChunks.has(k) && !buildQueue.find(q => q.k === k))
                needed.push({ cx, cz, k, dist: dcx*dcx + dcz*dcz });
        }
    }
    needed.sort((a, b) => a.dist - b.dist);
    buildQueue.push(...needed);
}

const loadingEl = document.getElementById("loading");
function processBuildQueue() {
    if (!buildQueue.length) { loadingEl.textContent = ""; return; }
    const { cx, cz, k } = buildQueue.shift();
    if (!loadedChunks.has(k)) { generateChunk(cx, cz); loadedChunks.set(k, true); flushColors(); }
    loadingEl.textContent = buildQueue.length > 0 ? `Загрузка: ${buildQueue.length} чанков` : "";
}

// ─── РЕЙКАСТ — DDA (voxel traversal) ────────────────────────────────────────
// Идём по сетке клетка-за-клеткой вдоль луча.
// Сложность O(maxDist) вместо O(всех блоков).
// Нормаль определяется по тому, какая ось дала последний шаг.
function castRay(camPos, camDir, maxDist) {
    let x = Math.floor(camPos.x + 0.5);
    let y = Math.floor(camPos.y + 0.5);
    let z = Math.floor(camPos.z + 0.5);

    const dx = camDir.x, dy = camDir.y, dz = camDir.z;

    const stepX = dx > 0 ? 1 : -1;
    const stepY = dy > 0 ? 1 : -1;
    const stepZ = dz > 0 ? 1 : -1;

    // tDelta — сколько t нужно пройти чтобы пересечь одну клетку по каждой оси
    const tDeltaX = Math.abs(1 / dx);
    const tDeltaY = Math.abs(1 / dy);
    const tDeltaZ = Math.abs(1 / dz);

    // tMax — t до следующей границы клетки по каждой оси
    // (расстояние от текущей позиции до ближайшей целой границы)
    const ox = camPos.x, oy = camPos.y, oz = camPos.z;
    let tMaxX = dx === 0 ? Infinity : ((stepX > 0 ? (x + 0.5 - ox) : (ox - (x - 0.5))) / Math.abs(dx));
    let tMaxY = dy === 0 ? Infinity : ((stepY > 0 ? (y + 0.5 - oy) : (oy - (y - 0.5))) / Math.abs(dy));
    let tMaxZ = dz === 0 ? Infinity : ((stepZ > 0 ? (z + 0.5 - oz) : (oz - (z - 0.5))) / Math.abs(dz));

    let face = 0; // 0=x, 1=y, 2=z — ось последнего шага

    // Проверяем стартовую клетку
    let entry = blockMap.get(bkey(x, y, z));
    if (entry && entry.type !== "water" && entry.type !== "lava") {
        const nx = face === 0 ? -stepX : 0;
        const ny = face === 1 ? -stepY : 0;
        const nz = face === 2 ? -stepZ : 0;
        return { entry, faceNormal: new THREE.Vector3(nx, ny, nz), distance: 0 };
    }

    for (let i = 0; i < maxDist * 3 + 6; i++) {
        let t;
        if (tMaxX < tMaxY && tMaxX < tMaxZ) {
            x += stepX; t = tMaxX; tMaxX += tDeltaX; face = 0;
        } else if (tMaxY < tMaxZ) {
            y += stepY; t = tMaxY; tMaxY += tDeltaY; face = 1;
        } else {
            z += stepZ; t = tMaxZ; tMaxZ += tDeltaZ; face = 2;
        }
        if (t > maxDist) break;

        entry = blockMap.get(bkey(x, y, z));
        if (entry && entry.type !== "water" && entry.type !== "lava") {
            const nx = face === 0 ? -stepX : 0;
            const ny = face === 1 ? -stepY : 0;
            const nz = face === 2 ? -stepZ : 0;
            return { entry, faceNormal: new THREE.Vector3(nx, ny, nz), distance: t };
        }
    }
    return null;
}

// ─── СГЛАЖИВАНИЕ DT ──────────────────────────────────────────────────────────
const DT_HISTORY_SIZE = 5;
const dtHistory = new Array(DT_HISTORY_SIZE).fill(1 / 60);
let dtHistIdx = 0;
function smoothDt(raw) {
    const clamped = Math.min(raw, 0.1);
    dtHistory[dtHistIdx] = clamped;
    dtHistIdx = (dtHistIdx + 1) % DT_HISTORY_SIZE;
    const sorted = dtHistory.slice().sort((a, b) => a - b);
    const median = sorted[Math.floor(DT_HISTORY_SIZE / 2)];
    return clamped > median * 2 ? median : clamped;
}

// ─── ФИЗИКА ──────────────────────────────────────────────────────────────────
const FIXED_DT   = 1 / 60;
const PLAYER_H   = 1.75;
const PLAYER_R   = 0.28;
const GRAVITY    = 0.018;
const JUMP_FORCE = 0.30;
const SWIM_UP    = 0.12;
const WATER_DRAG = 0.78;

const pos     = new THREE.Vector3(0, 20, 15);
const posPrev = new THREE.Vector3(0, 20, 15);

let velY = 0, onGround = false, inWater = false, inLava = false, accumTime = 0;

function feetY() { return pos.y - PLAYER_H; }

function checkGround() {
    const by = Math.floor(feetY() - 0.1);
    const r  = PLAYER_R - 0.02;
    return isSolid(Math.round(pos.x + r), by, Math.round(pos.z + r))
        || isSolid(Math.round(pos.x - r), by, Math.round(pos.z + r))
        || isSolid(Math.round(pos.x + r), by, Math.round(pos.z - r))
        || isSolid(Math.round(pos.x - r), by, Math.round(pos.z - r));
}
function checkInWater() { return isWaterAt(Math.round(pos.x), Math.round(feetY() + 0.3), Math.round(pos.z)); }
function checkInLava()  { return isLavaAt(Math.round(pos.x),  Math.round(feetY() + 0.3), Math.round(pos.z)); }

function tryMoveAxis(axis, delta) {
    if (delta === 0) return;
    const sign = Math.sign(delta);
    const nx = pos.x + (axis === "x" ? delta : 0);
    const nz = pos.z + (axis === "z" ? delta : 0);
    const fy = feetY();
    for (const h of [0.1, 0.9, 1.6]) {
        const by = Math.round(fy + h);
        const perp = PLAYER_R - 0.02;
        let blocked = false;
        if (axis === "x") {
            const checkX = Math.round(nx + sign * PLAYER_R);
            blocked = isSolid(checkX, by, Math.round(nz - perp)) || isSolid(checkX, by, Math.round(nz + perp));
        } else {
            const checkZ = Math.round(nz + sign * PLAYER_R);
            blocked = isSolid(Math.round(nx - perp), by, checkZ) || isSolid(Math.round(nx + perp), by, checkZ);
        }
        if (blocked) return;
    }
    if (axis === "x") pos.x = nx; else pos.z = nz;
}

function physicsTick() {
    const spd = (inWater || inLava) ? 0.07 : 0.13;
    const sinY = Math.sin(yaw), cosY = Math.cos(yaw);
    let dx = 0, dz = 0;

    // Клавиатура
    if (keys["KeyW"]) { dx -= sinY * spd; dz -= cosY * spd; }
    if (keys["KeyS"]) { dx += sinY * spd; dz += cosY * spd; }
    if (keys["KeyA"]) { dx -= cosY * spd; dz += sinY * spd; }
    if (keys["KeyD"]) { dx += cosY * spd; dz -= sinY * spd; }

    // Джойстик (joyX = вправо, joyY > 0 = тянем вниз = идём вперёд)
    if (joyX !== 0 || joyY !== 0) {
        dx += ( cosY * joyX + sinY * joyY) * spd;
        dz += (-sinY * joyX + cosY * joyY) * spd;
    }

    tryMoveAxis("x", dx);
    tryMoveAxis("z", dz);

    inWater = checkInWater();
    inLava  = !inWater && checkInLava();

    if (inWater || inLava) {
        velY *= WATER_DRAG;
        if (keys["Space"]) velY = SWIM_UP;
        else velY -= GRAVITY * 0.2;
        const headUnder = inWater
            ? isWaterAt(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z))
            : isLavaAt(Math.round(pos.x),  Math.round(pos.y), Math.round(pos.z));
        if (keys["Space"] && !headUnder) { velY = JUMP_FORCE; inWater = false; inLava = false; }
        pos.y += velY;
        const minY = DEEP_LIMIT + 0.5 + PLAYER_H;
        if (pos.y < minY) { pos.y = minY; if (velY < 0) velY = 0; }
    } else {
        if (!onGround) velY -= GRAVITY;
        pos.y += velY;
        onGround = checkGround();
        if (onGround && velY <= 0) {
            const by = Math.floor(feetY() - 0.1);
            pos.y = by + 1.0 + PLAYER_H;
            velY = 0;
        }
        if (keys["Space"] && onGround) { velY = JUMP_FORCE; onGround = false; }
    }

    if (velY > 0) {
        const hb = Math.round(pos.y + 0.1);
        if (isSolid(Math.round(pos.x), hb, Math.round(pos.z))) { velY = 0; pos.y = hb - 0.65; }
    }
    // Абсолютное дно — ниже лавы не падаем
    if (pos.y < DEEP_LIMIT + PLAYER_H) { pos.y = DEEP_LIMIT + PLAYER_H; velY = 0; }

    scheduleChunks(pos.x, pos.z);
}

// ─── LOD — единый подход для всех сущностей ──────────────────────────────────
// Три уровня по дистанции от игрока:
//   NEAR  (0..DIST_NEAR)  — полное обновление каждый кадр + visible
//   MID   (NEAR..DIST_MID)— обновление каждые N кадров + visible
//   FAR   (MID..)         — visible=false, обновление заморожено
//
// Функция entityLOD(ex, ez) возвращает: "near" | "mid" | "far"
// Используется одинаково для рыб, свиней, и любых будущих сущностей.

const LOD_NEAR = 40;   // блоков — полное обновление
const LOD_MID  = 80;   // блоков — редкое обновление
const LOD_NEAR2 = LOD_NEAR * LOD_NEAR;
const LOD_MID2  = LOD_MID  * LOD_MID;

function entityLOD(ex, ez) {
    const dx = ex - interpPos.x, dz = ez - interpPos.z;
    const d2 = dx*dx + dz*dz;
    if (d2 < LOD_NEAR2) return "near";
    if (d2 < LOD_MID2)  return "mid";
    return "far";
}

// ─── ФИЗИКА СВИНЕЙ ───────────────────────────────────────────────────────────
// Низ модели = -0.645 от центра (ноги: y=-0.47, h=0.35 → низ = -0.645)
// pig.position.y = (surfaceBlock + 0.5) + PIG_FOOT_OFFSET

function updatePigs(simTime) {
    for (const pig of pigGroup) {
        const d = pig.userData;
        const lod = entityLOD(d.px, d.pz);

        // FAR — скрываем, ничего не считаем
        if (lod === "far") { pig.visible = false; continue; }
        pig.visible = true;

        // MID — двигаем только каждые 4 кадра, анимацию замораживаем
        const skipUpdate = lod === "mid" && (simTime * 60 | 0) % 4 !== 0;
        if (!skipUpdate) {
            d.turnTimer--;
            if (d.turnTimer <= 0) {
                d.dir += (Math.random() - 0.5) * Math.PI * 0.8;
                d.turnTimer = 60 + Math.random() * 180;
            }

            const spd = d.speed;
            const nx = d.px + Math.sin(d.dir) * spd;
            const nz = d.pz + Math.cos(d.dir) * spd;
            if (!inLake(nx, nz)) { d.px = nx; d.pz = nz; }
            else d.dir += Math.PI * 0.5;

            if (!d.onGround) d.velY -= GRAVITY;
            d.py += d.velY;

            const pigFeetY = d.py - PIG_FOOT_OFFSET;
            const pigBy = Math.floor(pigFeetY - 0.05);
            const pigOnGround = isSolid(Math.round(d.px), pigBy, Math.round(d.pz));
            if (pigOnGround && d.velY <= 0) {
                d.py = (pigBy + 0.5) + PIG_FOOT_OFFSET;
                d.velY = 0; d.onGround = true;
            } else {
                d.onGround = false;
                const expectedSurf = Math.max(terrainHeight(d.px, d.pz), WATER_LEVEL + 1);
                const expectedPy   = (expectedSurf + 0.5) + PIG_FOOT_OFFSET;
                if (d.py < expectedPy) { d.py = expectedPy; d.velY = 0; d.onGround = true; }
            }

            pig.position.set(d.px, d.py, d.pz);
            pig.rotation.y = -d.dir;
        }

        // Анимация ног — только NEAR
        if (lod === "near") {
            d.legPhase += d.speed * 4;
            const swing = Math.sin(d.legPhase) * 0.3;
            pig.children[3].rotation.x =  swing;
            pig.children[4].rotation.x = -swing;
            pig.children[5].rotation.x = -swing;
            pig.children[6].rotation.x =  swing;
        }
    }
}

const keys = {};
document.addEventListener("keyup", e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
// Pointer lock только по клику на canvas рендерера, не на UI-элементы
renderer.domElement.addEventListener("click", () => renderer.domElement.requestPointerLock());
document.addEventListener("mousemove", e => {
    if (document.pointerLockElement !== renderer.domElement) return;
    yaw   -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch  = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
});

// Общие функции действий — используются и десктопом и мобильными кнопками.
// Всегда пересчитывают луч сами, не полагаясь на currentHit из прошлого кадра.
function getHit() {
    _rayOrig.copy(interpPos);
    _rayDir.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    return castRay(_rayOrig, _rayDir, 6);
}

function doBreak() {
    const hit = getHit();
    if (!hit) return;
    const broken = hit.entry;
    const k = bkey(broken.x, broken.y, broken.z);
    if (broken.type === "rainbow") { rainbowCount++; updateRainbowUI(); }
    if (broken.type === "aquarium") removeAquariumFish(broken.x, broken.y, broken.z);
    removeBlock(broken);
    flushColors();
    currentHit = null;
    // Трекинг дельты
    if (userPlaced.has(k)) {
        userPlaced.delete(k);          // убрал свой же блок — просто стираем
    } else if (worldGenKeys.has(k)) {
        userRemoved.add(k);            // снёс мировой блок
    }
}

function doPlace() {
    const hit = getHit();
    if (!hit) return;
    const e2 = hit.entry, n = hit.faceNormal;
    const bx = e2.x + n.x, by = e2.y + n.y, bz = e2.z + n.z;
    const dx = Math.abs(bx - pos.x), dz2 = Math.abs(bz - pos.z), dy = by - feetY();
    if (dx < 0.6 && dz2 < 0.6 && dy > -0.1 && dy < PLAYER_H + 0.2) return;
    if (selected === "rainbow") {
        if (rainbowCrafted <= 0) return;
        addBlock(bx, by, bz, selected);
        rainbowCrafted--;
        updateRainbowUI();
        if (rainbowCrafted === 0) {
            document.querySelectorAll(".slot").forEach(s => s.classList.remove("active"));
            document.querySelector(".slot[data-type='grass']").classList.add("active");
            selected = "grass";
        }
    } else {
        addBlock._lastFail = null;
        addBlock(bx, by, bz, selected);
        if (selected === "aquarium") spawnAquariumFish(bx, by, bz);
        if (addBlock._lastFail) hudEl._dbg = `addBlock fail: ${addBlock._lastFail}`;
        else {
            // Трекинг дельты — фиксируем поставленный блок
            const pk = bkey(bx, by, bz);
            userPlaced.set(pk, { x: Math.round(bx), y: Math.round(by), z: Math.round(bz), type: selected });
            userRemoved.delete(pk); // если ставим туда где сносили — убираем из removed
        }
    }
    flushColors();
}

// ─── 3D ИКОНКИ БЛОКОВ НА CANVAS ─────────────────────────────────────────────
// Рисуем изометрическую проекцию куба с тремя гранями разной яркости.
// Каждый блок имеет свои цвета граней (top / left / right).
const ICON_DEF = {
    grass:   { top: "#6abf5e", left: "#3d8b3d", right: "#2e6b2e", label: "🌿" },
    stone:   { top: "#aaaaaa", left: "#707070", right: "#555555", label: "🪨" },
    wood:    { top: "#c8874a", left: "#7a4520", right: "#5c3218", label: "🪵" },
    leaf:    { top: "#4caf50", left: "#2e7d32", right: "#1b5e20", label: "🍃" },
    sand:    { top: "#f0d98a", left: "#c8a84b", right: "#a07830", label: "🏖" },
    rainbow: { top: null,      left: null,      right: null,      label: "🌈" },
    lava:    { top: "#ff7043", left: "#bf360c", right: "#8b1a00", label: "🔥" },
    water:   { top: "#42a5f5", left: "#1565c0", right: "#0d47a1", label: "💧" },
    aquarium:{ top: "#aaeeff", left: "#55bbdd", right: "#2299bb", label: "🐠" },
    glass:   { top: "#e8f8ff", left: "#b0ddf0", right: "#80bedd", label: "🪟" },
};

function drawBlockIcon(canvas, type) {
    const S = 104; // рендерим в 2x для чёткости
    canvas.width  = S;
    canvas.height = S;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, S, S);

    const def = ICON_DEF[type];
    if (!def) return;

    if (type === "rainbow") {
        // Радужный куб — особая отрисовка с градиентными гранями
        drawRainbowIcon(ctx, S);
        return;
    }

    if (type === "aquarium") {
        drawAquariumIcon(ctx, S);
        return;
    }

    if (type === "glass") {
        drawGlassIcon(ctx, S);
        return;
    }

    // Изометрический куб: проекция top / left-front / right-front
    // Размер грани в проекции
    const W = S * 0.72, H = W * 0.5; // ширина и высота top-ромба
    const FH = S * 0.38; // высота боковых граней

    const cx = S / 2;
    const topY = S * 0.14;

    // Top face (ромб)
    ctx.beginPath();
    ctx.moveTo(cx,       topY);
    ctx.lineTo(cx + W/2, topY + H/2);
    ctx.lineTo(cx,       topY + H);
    ctx.lineTo(cx - W/2, topY + H/2);
    ctx.closePath();
    ctx.fillStyle = def.top;
    ctx.fill();
    // тонкая обводка
    ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 0.8; ctx.stroke();

    // Left face (параллелограмм)
    ctx.beginPath();
    ctx.moveTo(cx - W/2, topY + H/2);
    ctx.lineTo(cx,       topY + H);
    ctx.lineTo(cx,       topY + H + FH);
    ctx.lineTo(cx - W/2, topY + H/2 + FH);
    ctx.closePath();
    ctx.fillStyle = def.left;
    ctx.fill();
    ctx.stroke();

    // Right face
    ctx.beginPath();
    ctx.moveTo(cx,       topY + H);
    ctx.lineTo(cx + W/2, topY + H/2);
    ctx.lineTo(cx + W/2, topY + H/2 + FH);
    ctx.lineTo(cx,       topY + H + FH);
    ctx.closePath();
    ctx.fillStyle = def.right;
    ctx.fill();
    ctx.stroke();

    // Небольшая ambient occlusion по краям
    const grad = ctx.createLinearGradient(0, topY + H, 0, topY + H + FH);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,0.18)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx - W/2, topY + H/2);
    ctx.lineTo(cx + W/2, topY + H/2);
    ctx.lineTo(cx + W/2, topY + H/2 + FH);
    ctx.lineTo(cx - W/2, topY + H/2 + FH);
    ctx.closePath();
    ctx.fill();

    // Блик на top-грани
    ctx.beginPath();
    ctx.moveTo(cx,       topY + 2);
    ctx.lineTo(cx + W/2 * 0.6, topY + H/2 * 0.6);
    ctx.lineTo(cx,       topY + H * 0.6);
    ctx.lineTo(cx - W/2 * 0.6, topY + H/2 * 0.6);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fill();
}

function drawRainbowIcon(ctx, S) {
    const COLORS = ["#ff4444","#ff9900","#ffee00","#44cc44","#2299ff","#9933ff","#ff44bb"];
    const W = S * 0.72, H = W * 0.5, FH = S * 0.38;
    const cx = S / 2, topY = S * 0.14;

    // Top — горизонтальные полосы в ромбе
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath(); ctx.clip();
    const strH = H / COLORS.length;
    for (let i = 0; i < COLORS.length; i++) {
        ctx.fillStyle = COLORS[i];
        ctx.fillRect(cx - W/2, topY + i * strH, W, strH + 1);
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath(); ctx.stroke();

    // Left face — вертикальные полосы
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath(); ctx.clip();
    const lw = W / COLORS.length;
    for (let i = 0; i < COLORS.length; i++) {
        const darkened = shadeColor(COLORS[i], -40);
        ctx.fillStyle = darkened;
        // Вертикальные полосы скошены под углом грани
        ctx.fillRect(cx - W/2 + i * lw, topY, lw + 1, S);
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath(); ctx.stroke();

    // Right face
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath(); ctx.clip();
    for (let i = 0; i < COLORS.length; i++) {
        const darkened = shadeColor(COLORS[i], -65);
        ctx.fillStyle = darkened;
        ctx.fillRect(cx + i * lw, topY, lw + 1, S);
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath(); ctx.stroke();

    // Блик
    ctx.beginPath();
    ctx.moveTo(cx, topY+2); ctx.lineTo(cx+W/2*0.5, topY+H/2*0.5);
    ctx.lineTo(cx, topY+H*0.5); ctx.lineTo(cx-W/2*0.5, topY+H/2*0.5);
    ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fill();
}

function shadeColor(hex, amt) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.max(0, Math.min(255, r + amt));
    g = Math.max(0, Math.min(255, g + amt));
    b = Math.max(0, Math.min(255, b + amt));
    return `rgb(${r},${g},${b})`;
}

function drawAquariumIcon(ctx, S) {
    const W = S * 0.72, H = W * 0.5, FH = S * 0.38;
    const cx = S / 2, topY = S * 0.14;

    // Top face
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath();
    ctx.fillStyle = "rgba(150,230,255,0.7)"; ctx.fill();
    ctx.strokeStyle = "rgba(0,150,220,0.5)"; ctx.lineWidth = 0.8; ctx.stroke();

    // Left face — вода с рыбкой
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(30,120,200,0.45)"; ctx.fill();
    ctx.strokeStyle = "rgba(0,100,180,0.6)"; ctx.lineWidth = 0.8; ctx.stroke();
    // рыбка слева
    ctx.fillStyle = "#ff9800";
    ctx.beginPath(); ctx.ellipse(cx-W/3.5, topY+H+FH*0.45, 6, 3.5, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx-W/3.5+6, topY+H+FH*0.45); ctx.lineTo(cx-W/3.5+10, topY+H+FH*0.45-3); ctx.lineTo(cx-W/3.5+10, topY+H+FH*0.45+3); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Right face — вода с рыбкой
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(20,90,160,0.55)"; ctx.fill();
    ctx.strokeStyle = "rgba(0,80,150,0.6)"; ctx.lineWidth = 0.8; ctx.stroke();
    // рыбка справа
    ctx.fillStyle = "#e91e63";
    ctx.beginPath(); ctx.ellipse(cx+W/4.5, topY+H+FH*0.35, 5, 3, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+W/4.5-5, topY+H+FH*0.35); ctx.lineTo(cx+W/4.5-9, topY+H+FH*0.35-2.5); ctx.lineTo(cx+W/4.5-9, topY+H+FH*0.35+2.5); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Блик на top
    ctx.beginPath();
    ctx.moveTo(cx, topY+2); ctx.lineTo(cx+W/2*0.5, topY+H/2*0.5);
    ctx.lineTo(cx, topY+H*0.5); ctx.lineTo(cx-W/2*0.5, topY+H/2*0.5);
    ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.25)"; ctx.fill();
}

function drawGlassIcon(ctx, S) {
    const W = S * 0.72, H = W * 0.5, FH = S * 0.38;
    const cx = S / 2, topY = S * 0.14;

    // Top face — почти прозрачная
    ctx.beginPath();
    ctx.moveTo(cx, topY); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx, topY+H); ctx.lineTo(cx-W/2, topY+H/2);
    ctx.closePath();
    ctx.fillStyle = "rgba(210,240,255,0.55)"; ctx.fill();
    ctx.strokeStyle = "rgba(120,190,230,0.7)"; ctx.lineWidth = 1; ctx.stroke();

    // Left face
    ctx.beginPath();
    ctx.moveTo(cx-W/2, topY+H/2); ctx.lineTo(cx, topY+H);
    ctx.lineTo(cx, topY+H+FH); ctx.lineTo(cx-W/2, topY+H/2+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(140,200,230,0.38)"; ctx.fill();
    ctx.strokeStyle = "rgba(80,150,200,0.6)"; ctx.lineWidth = 1; ctx.stroke();

    // Right face
    ctx.beginPath();
    ctx.moveTo(cx, topY+H); ctx.lineTo(cx+W/2, topY+H/2);
    ctx.lineTo(cx+W/2, topY+H/2+FH); ctx.lineTo(cx, topY+H+FH);
    ctx.closePath();
    ctx.fillStyle = "rgba(100,170,210,0.45)"; ctx.fill();
    ctx.strokeStyle = "rgba(60,120,180,0.6)"; ctx.lineWidth = 1; ctx.stroke();

    // Крупный блик — характерная черта стекла
    ctx.beginPath();
    ctx.moveTo(cx - W*0.08, topY + H*0.18);
    ctx.lineTo(cx - W*0.28, topY + H*0.46);
    ctx.lineTo(cx - W*0.22, topY + H*0.52);
    ctx.lineTo(cx - W*0.02, topY + H*0.24);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.fill();

    // Малый блик
    ctx.beginPath();
    ctx.moveTo(cx + W*0.05, topY + H*0.08);
    ctx.lineTo(cx + W*0.18, topY + H*0.22);
    ctx.lineTo(cx + W*0.14, topY + H*0.26);
    ctx.lineTo(cx + W*0.01, topY + H*0.12);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();
}

const SLOT_TYPES = ["grass","stone","wood","leaf","sand","rainbow","aquarium","glass"];

function selectSlot(idx) {
    const type = SLOT_TYPES[idx];
    if (!type) return;
    // Rainbow можно выбрать только если есть скрафченные
    if (type === "rainbow" && rainbowCrafted === 0) return;

// Клик мышью по слоту — работает всегда (pointer lock не мешает)
document.querySelectorAll(".slot").forEach((slot) => {
    const type = slot.dataset.type;
    slot.addEventListener("mousedown", e => {
        e.stopPropagation();
        const idx = SLOT_TYPES.indexOf(type);
        if (idx >= 0) selectSlot(idx);
    });
    // На мобильном — touchstart, иначе look-zone перехватывает
    slot.addEventListener("touchstart", e => {
        e.stopPropagation();

        const idx = SLOT_TYPES.indexOf(type);
        if (idx >= 0) selectSlot(idx);
    }, { passive: false });
});

// Цифры 1–6 и Tab
document.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (e.code === "Space") e.preventDefault();
    // Цифры
    if (e.code.startsWith("Digit")) {
        const n = parseInt(e.code.replace("Digit","")) - 1;
        if (n >= 0 && n < SLOT_TYPES.length) selectSlot(n);
    }
    // Tab — следующий слот
    if (e.code === "Tab") {
        e.preventDefault();
        const cur = SLOT_TYPES.indexOf(selected);
        selectSlot((cur + 1) % SLOT_TYPES.length);
    }
});

// ─── МОБИЛЬНЫЕ КОНТРОЛЫ ──────────────────────────────────────────────────────
// Джойстик управляет движением через виртуальные оси joyX/joyY [-1..1].
// Область свайпа справа управляет камерой (yaw/pitch).
// Кнопка прыжка — keys["Space"].

let joyX = 0, joyY = 0; // виртуальные оси джойстика

const joystickZone = document.getElementById("joystick-zone");
const joystickKnob = document.getElementById("joystick-knob");
const btnJump      = document.getElementById("btn-jump");
const lookZone     = document.getElementById("look-zone");

if (joystickZone) {
    const JOY_R = 65; // радиус зоны в px
    const KNOB_R = 26;
    let joyActive = false, joyId = -1;
    let joyOriginX = 0, joyOriginY = 0;

    joystickZone.addEventListener("touchstart", e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        joyActive = true; joyId = t.identifier;
        const rect = joystickZone.getBoundingClientRect();
        joyOriginX = rect.left + rect.width  / 2;
        joyOriginY = rect.top  + rect.height / 2;
    }, { passive: false });

    function joyMove(e) {
        if (!joyActive) return;
        e.preventDefault();
        let t = null;
        for (const touch of e.changedTouches) if (touch.identifier === joyId) { t = touch; break; }
        if (!t) return;
        let dx = t.clientX - joyOriginX;
        let dy = t.clientY - joyOriginY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > JOY_R) { dx = dx/dist*JOY_R; dy = dy/dist*JOY_R; }
        joyX = dx / JOY_R;
        joyY = dy / JOY_R;
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
    function joyEnd(e) {
        for (const touch of e.changedTouches) {
            if (touch.identifier === joyId) {
                joyActive = false; joyId = -1;
                joyX = 0; joyY = 0;
                joystickKnob.style.transform = "translate(-50%, -50%)";
            }
        }
    }
    document.addEventListener("touchmove",   joyMove, { passive: false });
    document.addEventListener("touchend",    joyEnd);
    document.addEventListener("touchcancel", joyEnd);
}

// Кнопка прыжка
if (btnJump) {
    btnJump.addEventListener("touchstart", e => { e.preventDefault(); keys["Space"] = true;  }, { passive: false });
    btnJump.addEventListener("touchend",   e => { e.preventDefault(); keys["Space"] = false; }, { passive: false });
}

// Зона свайпа для камеры (правая половина экрана)
if (lookZone) {
    let lookId = -1, lookLastX = 0, lookLastY = 0;
    const LOOK_SENS = 0.005;
    const BTN_IDS = new Set(["btn-jump","btn-break","btn-place"]);

    lookZone.addEventListener("touchstart", e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        // Не захватываем тач если он начался на кнопке
        const target = document.elementFromPoint(t.clientX, t.clientY);
        if (target && BTN_IDS.has(target.id)) return;
        lookId = t.identifier; lookLastX = t.clientX; lookLastY = t.clientY;
    }, { passive: false });

    lookZone.addEventListener("touchmove", e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            if (t.identifier !== lookId) continue;
            yaw   -= (t.clientX - lookLastX) * LOOK_SENS;
            pitch -= (t.clientY - lookLastY) * LOOK_SENS;
            pitch  = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            lookLastX = t.clientX; lookLastY = t.clientY;
        }
    }, { passive: false });

    lookZone.addEventListener("touchend",   e => { for (const t of e.changedTouches) if (t.identifier === lookId) lookId = -1; });
    lookZone.addEventListener("touchcancel",e => { lookId = -1; });
}

    }
});

saveBtn.addEventListener("click", () => saveWorld());

// Скользящее среднее за ~60 кадров для каждой секции
const PROF_ALPHA = 0.05; // EMA: 0.05 ≈ среднее за ~20 кадров
const profStats = {};
function profMark(name, ms) {
    if (!profStats[name]) profStats[name] = ms;
    profStats[name] = profStats[name] * (1 - PROF_ALPHA) + ms * PROF_ALPHA;
}

// ─── ГЛАВНЫЙ ЦИКЛ ────────────────────────────────────────────────────────────
let lastRafTime = -1, simTime = 0;
const underwaterDiv  = document.getElementById("underwater");
const lavaOverlayDiv = document.getElementById("lava-overlay");

function animate(now) {
    requestAnimationFrame(animate);
    if (lastRafTime < 0) { lastRafTime = now; return; }

    const rawDt = (now - lastRafTime) / 1000;
    lastRafTime = now;
    const dt = smoothDt(rawDt);

    fpsFrames++; fpsAccum += rawDt;
    if (fpsAccum >= 0.5) {
        const fps = Math.round(fpsFrames / fpsAccum);
        fpsEl.textContent = fps + " FPS";
        fpsEl.style.color = fps >= 50 ? "#0f0" : fps >= 30 ? "#ff0" : "#f44";
        fpsFrames = 0; fpsAccum = 0;

        if (profilerOn) {
            const order = ["physics","fish","pigs","clouds","buildQueue","torchLight","raycast","render","TOTAL"];
            const lines = order.map(k => {
                const v = profStats[k];
                if (v === undefined) return null;
                const ms = v.toFixed(2);
                const bar = "█".repeat(Math.min(20, Math.round(v * 4)));
                const color = v > 8 ? "#f44" : v > 3 ? "#ff0" : "#0f0";
                return `<span style="color:${color}">${k.padEnd(12)}${ms.padStart(5)}ms ${bar}</span>`;
            }).filter(Boolean);
            profilerEl.innerHTML = "<b style='color:#fff'>F3 — профайлер</b><br>" + lines.join("<br>");
        }
    }

    let t0, t1;

    accumTime += dt;
    posPrev.copy(pos);
    t0 = performance.now();
    while (accumTime >= FIXED_DT) {
        physicsTick();
        accumTime -= FIXED_DT;
        simTime += FIXED_DT;
    }
    if (profilerOn) profMark("physics", performance.now() - t0);

    const alpha = Math.min(accumTime / FIXED_DT, 1);
    interpPos.lerpVectors(posPrev, pos, alpha);
    camera.position.copy(interpPos);
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Координаты + выбранный блок в HUD
    hudEl.textContent = `X:${Math.round(pos.x)} \u00a0 Y:${Math.round(feetY())} \u00a0 Z:${Math.round(pos.z)}`;
    if (hudEl._dbg) hudEl.textContent += `\n${hudEl._dbg}`;

    // Оверлеи
    const headInWater = isWaterAt(Math.round(interpPos.x), Math.round(interpPos.y), Math.round(interpPos.z));
    const headInLava  = isLavaAt (Math.round(interpPos.x), Math.round(interpPos.y), Math.round(interpPos.z));
    underwaterDiv.style.display  = headInWater ? "block" : "none";
    lavaOverlayDiv.style.display = headInLava  ? "block" : "none";

    // Рыбы — LOD по дистанции
    t0 = performance.now();
    for (const fish of fishGroup) {
        const d = fish.userData;
        const lod = entityLOD(d.cx, d.cz);
        if (lod === "far") { fish.visible = false; continue; }
        fish.visible = true;
        if (lod === "mid" && (simTime * 60 | 0) % 3 !== 0) continue;
        d.angle += d.speed;
        fish.position.x = d.cx + Math.cos(d.angle) * d.radius;
        fish.position.z = d.cz + Math.sin(d.angle) * d.radius;
        fish.position.y = d.cy + Math.sin(simTime * 2 + d.wobble) * 0.1;
        fish.rotation.y = -d.angle + Math.PI / 2;
        if (lod === "near") fish.children[1].rotation.y = Math.sin(simTime * 9 + d.wobble) * 0.4;
    }
    updateAquariumFish(simTime);
    if (profilerOn) profMark("fish", performance.now() - t0);

    // Свиньи
    t0 = performance.now();
    updatePigs(simTime);
    if (profilerOn) profMark("pigs", performance.now() - t0);

    // Облака
    t0 = performance.now();
    for (const c of clouds) {
        c.position.x += c.userData.speed;
        if (c.position.x > 120) c.position.x = -120;
        const cdx = c.position.x - interpPos.x, cdz = c.position.z - interpPos.z;
        c.visible = (cdx*cdx + cdz*cdz) < 150*150;
    }
    if (profilerOn) profMark("clouds", performance.now() - t0);

    // Очередь чанков
    t0 = performance.now();
    processBuildQueue();
    if (profilerOn) profMark("buildQueue", performance.now() - t0);

    // Подсветка от "факела"
    t0 = performance.now();
    updateTorchLight(interpPos.x, interpPos.y, interpPos.z);
    if (profilerOn) profMark("torchLight", performance.now() - t0);

    // Рейкаст
    t0 = performance.now();
    _rayOrig.copy(interpPos);
    _rayDir.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    const hit = castRay(_rayOrig, _rayDir, 6);
    if (hit) { highlight.visible = true; highlight.position.set(hit.entry.x, hit.entry.y, hit.entry.z); currentHit = hit; }
    else      { highlight.visible = false; currentHit = null; }
    if (profilerOn) profMark("raycast", performance.now() - t0);

    // Рендер
    t0 = performance.now();
    renderer.render(scene, camera);
    t1 = performance.now();
    if (profilerOn) {
        profMark("render", t1 - t0);
        profMark("TOTAL", (t1 - (now)) + rawDt * 1000 * 0); // общее время кадра
        // Считаем TOTAL как сумму всех секций
        const total = ["physics","fish","pigs","clouds","buildQueue","torchLight","raycast","render"]
            .reduce((s, k) => s + (profStats[k] || 0), 0);
        profStats["TOTAL"] = total;
    }
}

// ─── СТАРТ ───────────────────────────────────────────────────────────────────

const splashEl   = document.getElementById("splash");
const splashMenu = document.getElementById("splash-menu");
const btnNewGame = document.getElementById("btn-new-game");
const btnLoadGame= document.getElementById("btn-load-game");
const menuHint   = document.getElementById("menu-hint");

function hideSplash() {
    splashEl.style.transition = "opacity 0.4s";
    splashEl.style.opacity = "0";
    splashEl.style.pointerEvents = "none";
    setTimeout(() => { splashEl.style.display = "none"; }, 420);
}

async function startGame(loadSave) {
    hideSplash();
    requestPersistentStorage();
    if (loadSave) {
        const saved = await initWorldFromDB();
        scheduleChunks(0, 0);
        worldGenDone = true;
        await loadWorldDelta(saved);
    } else {
        initWorldSeed(Math.random() * 0xFFFFFFFF | 0);
        scheduleChunks(0, 0);
        worldGenDone = true;
    }
    requestAnimationFrame(animate);
}

async function onReady() {
    // Анимация логотипа играет ~2с — показываем меню после неё
    const pieceOrder = ["pr","po","py","pg","pb"];
    let delay = 0.1;
    pieceOrder.forEach(id => {
        document.querySelectorAll(`#${id} > g`).forEach(block => {
            block.style.animationDelay = delay.toFixed(2) + "s";
            block.style.transformOrigin = "center center";
            delay += 0.12;
        });
        delay += 0.15;
    });
    // Показываем меню сразу, не ждём анимации логотипа
    splashMenu.classList.add("visible");

    // Параллельно проверяем наличие сохранения
    let hasSave = false;
    try {
        const saved = await dbGet("delta");
        hasSave = !!(saved && (saved.placed?.length || saved.removed?.length));
    } catch(e) { /* БД недоступна */ }

    if (hasSave) {
        btnLoadGame.disabled = false;
        menuHint.textContent = "найдено сохранение";
    } else {
        menuHint.textContent = "сохранений нет";
    }

    btnNewGame.addEventListener("click",  () => startGame(false));
    btnLoadGame.addEventListener("click", () => startGame(true));
}

window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

const IS_CORDOVA = typeof window.cordova !== "undefined";
if (IS_CORDOVA) {
    document.addEventListener("deviceready", onReady, { once: true });
} else {
    onReady();
}
</script>
